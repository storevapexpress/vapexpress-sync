    const td = 'px-3 py-2 whitespace-nowrap';
    const th = 'px-3 py-2 text-left font-semibold text-slate-500 whitespace-nowrap';
    return (
      <>
        <div>
          <h2 className="font-bold text-slate-900 text-lg">{title}</h2>
          <p className="text-xs text-slate-400">Penjualan via {payName} (iSeller){d.updated ? ' · update ' + d.updated : ''}</p>
        </div>
        <Card className="p-4">
          <div className="grid grid-cols-2 gap-3 items-end max-w-lg">
            <Field label="Toko"><select className={fieldCls} value={toko} onChange={e => setToko(e.target.value)}><option value="all">Semua Toko</option>{outlets.map(o => <option key={o} value={o}>{o}</option>)}</select></Field>
            <Field label="Bulan"><select className={fieldCls} value={bulan} onChange={e => setBulan(e.target.value)}>{months.slice().reverse().map(m => <option key={m} value={m}>{monthLabel(m)}</option>)}</select></Field>
          </div>
        </Card>
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
          <KpiCard label={'Omzet ' + monthLabel(bulan)} value={formatCurrency(curA)} changePct={momKpi} hint={toko === 'all' ? 'semua toko' : toko} />
          <KpiCard label="Transaksi" value={formatNumber(curC)} accent="violet" hint={monthLabel(bulan)} />
          <KpiCard label={'vs ' + monthLabel(pm)} value={formatCurrency(prvA)} accent="amber" hint="bulan lalu" />
          <KpiCard label="Rata-rata / Transaksi" value={formatCurrency(avgT)} accent="green" hint="per transaksi" />
        </div>
        <Card className="p-4 sm:p-5">
          <div className="flex flex-wrap items-center justify-between gap-3 mb-4">
            <h3 className="font-semibold text-slate-800 text-sm">Tren Penjualan {gran === 'daily' ? 'Harian' : gran === 'weekly' ? 'Mingguan' : 'Bulanan'}{toko !== 'all' ? ' — ' + toko : ''}</h3>
            <div className="inline-flex rounded-lg bg-slate-100 p-1">{tabs.map(t => <button key={t[0]} onClick={() => setGran(t[0])} className={'px-3 py-1.5 text-sm rounded-md font-medium ' + (gran === t[0] ? 'bg-white shadow text-brand-600' : 'text-slate-500')}>{t[1]}</button>)}</div>
          </div>
          {buckets.length ? (
            <div className="overflow-x-auto pb-1"><div className="flex items-end gap-1" style={{ height: '260px', minWidth: (buckets.length * slot) + 'px' }}>
              {buckets.map((b, i) => { const h = Math.round(b.amt / maxB * 100); return (
                <div key={i} className="flex-1 flex flex-col items-center justify-end h-full" style={{ minWidth: (slot - 3) + 'px' }}>
                  {few && <div className="text-[10px] font-semibold text-slate-700 mb-1 whitespace-nowrap">{jt(b.amt)}</div>}
                  <div title={b.label + ': ' + formatCurrency(b.amt) + ' · ' + formatNumber(b.cnt) + ' transaksi'} style={{ width: '78%', maxWidth: '46px', height: h + '%', minHeight: b.amt ? '3px' : '0', background: '#3b82f6', borderRadius: '4px 4px 0 0' }}></div>
                  <div className="text-[9px] text-slate-400 mt-1 whitespace-nowrap">{(few || i % lblEvery === 0) ? b.label : ''}</div>
                </div>); })}
            </div></div>
          ) : <div className="py-12 text-center text-slate-400 text-sm">Nggak ada data.</div>}
        </Card>
        <Card className="p-0 overflow-x-auto">
          <div className="px-4 pt-4 pb-2 font-semibold text-slate-800 text-sm">Analisa per Toko — {monthLabel(bulan)} <span className="text-xs font-normal text-slate-400">(vs {monthLabel(pm)})</span></div>
          <table className="w-full text-sm border-collapse">
            <thead className="bg-slate-50 border-y border-slate-200"><tr><th className={th}>#</th><th className={th}>Nama Toko</th><th className={th + ' text-right'}>Omzet</th><th className={th + ' text-right'}>Transaksi</th><th className={th + ' text-right'}>vs Bln Lalu</th></tr></thead>
            <tbody>
              {tableRows.map((r, i) => (
                <tr key={r.outlet} className="border-b border-slate-100">
                  <td className={td + ' text-slate-400'}>{i + 1}</td>
                  <td className={td + ' font-medium text-slate-800'}>{r.outlet}</td>
                  <td className={td + ' text-right font-semibold text-slate-900'}>{formatCurrency(r.amt)}</td>
                  <td className={td + ' text-right text-slate-600'}>{formatNumber(r.cnt)}</td>
                  <td className={td + ' text-right'}>{r.mom == null ? (r.amt > 0 ? <span className="text-green-600">baru</span> : '-') : <span className={r.mom >= 0 ? 'text-green-600' : 'text-rose-600'}>{(r.mom >= 0 ? '▲ ' : '▼ ') + Math.abs(r.mom).toFixed(0) + '%'}</span>}</td>
                </tr>
              ))}
              <tr className="bg-slate-50 font-bold text-slate-900 border-t-2 border-slate-200"><td className={td}></td><td className={td}>TOTAL ({tableRows.length} toko)</td><td className={td + ' text-right'}>{formatCurrency(tableTotal)}</td><td className={td + ' text-right'}>{formatNumber(tableTxn)}</td><td className={td}></td></tr>
            </tbody>
          </table>
        </Card>
      </>
    );
  }

  function ReportModule() {
    const TABS = ['Mini Store', 'Insentif', 'Grabmart', 'Tokopedia'];
    const [tab, setTab] = useState('Mini Store');
    return (
      <>
        <div className="flex flex-wrap gap-2">
          {TABS.map(t => (
            <button key={t} onClick={() => setTab(t)}
              className={'rounded-lg px-4 py-2 text-sm font-medium ' + (tab === t ? 'bg-brand-600 text-white' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-50')}>{t}</button>
          ))}
        </div>
        {tab === 'Mini Store' ? <MiniStoreModule /> : tab === 'Insentif' ? <InsentifModule /> : tab === 'Grabmart' ? <ChannelModule dataKey="grabmart" title="Grabmart" payName="GRAB MART" fallback={DEFAULT_GRABMART} since="2026-01-01" /> : tab === 'Tokopedia' ? <ChannelModule dataKey="tokopedia" title="Tokopedia" payName="TOKOPEDIA" fallback={DEFAULT_TOKOPEDIA} since="2026-04-01" /> : (
          <Card className="p-8 sm:p-10 text-center">
            <div className="text-4xl mb-3">📑</div>
            <h2 className="font-bold text-slate-900 text-lg">{tab}</h2>
            <p className="text-sm text-slate-400 mt-2 max-w-md mx-auto leading-relaxed">Bagian <b>{tab}</b> sedang disiapkan. Kita isi satu per satu.</p>
          </Card>
        )}
      </>
    );
  }

  // ============================ MINI STORE POS ============================
  function MiniStorePOS() {
    const rp = n => 'Rp ' + Math.round(Number(n) || 0).toLocaleString('id-ID');
    const dt = iso => { const d = new Date(iso); return d.getDate() + ' ' + MONTHS[d.getMonth()] + ' ' + String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0'); };
    const role = _readCookie('vpx_role');
    const isSA = role === 'Super Admin';
    const myStore = _readCookie('vpx_store');
    const email = _readCookie('vpx_email') || '';
    const SH = { apikey: SUPA_KEY, Authorization: 'Bearer ' + SUPA_KEY };
    const jsonH = Object.assign({}, SH, { 'Content-Type': 'application/json' });
    const minH = Object.assign({}, jsonH, { Prefer: 'return=minimal' });
    const api = (path, opts) => fetch(SUPA_URL + '/rest/v1/' + path, opts || { headers: SH });
    const fld = 'rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500/40';

    const [stores, setStores] = useState([]);
    const [storeId, setStoreId] = useState(null);
    const [tab, setTab] = useState('kasir');
    const [products, setProducts] = useState([]);
    const [cart, setCart] = useState({});
    const [sales, setSales] = useState([]);
    const [report, setReport] = useState(null);
    const [year, setYear] = useState((new Date()).getFullYear());
    const [busy, setBusy] = useState(true);
    const [msg, setMsg] = useState('');
    const [edit, setEdit] = useState(null);

    useEffect(() => { (async () => {
      try { const r = await api('ms_stores?select=*&order=name'); const list = r.ok ? await r.json() : [];
        setStores(list); setStoreId((!isSA && myStore) ? Number(myStore) : ((list[0] && list[0].id) || null)); } catch (e) {}
      setBusy(false);
    })(); }, []);

    const store = stores.find(s => s.id === storeId) || null;
    const commission = store ? Number(store.commission_pct) : 10;
    const loadProducts = async (sid) => { const r = await api('ms_products?store_id=eq.' + sid + '&order=name'); setProducts(r.ok ? await r.json() : []); };
    const loadSales = async (sid) => { const r = await api('ms_sales?store_id=eq.' + sid + '&order=created_at.desc&limit=50'); setSales(r.ok ? await r.json() : []); };
    const loadReport = async (sid, yr) => { setReport(null); const r = await api('rpc/ms_report', { method: 'POST', headers: jsonH, body: JSON.stringify({ p_store: sid, p_year: yr }) }); setReport(r.ok ? await r.json() : []); };
    useEffect(() => { if (storeId) { setCart({}); loadProducts(storeId); loadSales(storeId); } }, [storeId]);
    useEffect(() => { if (storeId && tab === 'report') loadReport(storeId, year); }, [storeId, tab, year]);
    const flash = t => { setMsg(t); setTimeout(() => setMsg(''), 3000); };

    const inCart = products.filter(p => cart[p.id] > 0);
    const cartTotal = inCart.reduce((s, p) => s + Number(p.price) * cart[p.id], 0);
    const cartQty = inCart.reduce((s, p) => s + cart[p.id], 0);
    const add = p => setCart(c => { const q = (c[p.id] || 0) + 1; if (q > Number(p.stock)) { flash('Stok ' + p.name + ' cuma ' + p.stock); return c; } return Object.assign({}, c, { [p.id]: q }); });
    const dec = p => setCart(c => { const q = (c[p.id] || 0) - 1; const n = Object.assign({}, c); if (q <= 0) delete n[p.id]; else n[p.id] = q; return n; });

    const checkout = async () => {
      if (!inCart.length) return; setBusy(true);
      const items = inCart.map(p => ({ product_id: p.id, name: p.name, price: Number(p.price), qty: cart[p.id] }));
      const total = items.reduce((s, i) => s + i.price * i.qty, 0); const qty = items.reduce((s, i) => s + i.qty, 0);
      await api('ms_sales', { method: 'POST', headers: minH, body: JSON.stringify({ store_id: storeId, total, qty, items, cashier_email: email }) });
      for (const i of items) { const p = products.find(pp => pp.id === i.product_id); const ns = Math.max(0, Number(p.stock) - i.qty); await api('ms_products?id=eq.' + i.product_id, { method: 'PATCH', headers: minH, body: JSON.stringify({ stock: ns }) }); }
      setCart({}); await loadProducts(storeId); await loadSales(storeId); setBusy(false); flash('✓ Penjualan tersimpan · ' + rp(total));
    };
    const saveProduct = async f => {
      if (!f.name) return;
      const body = { store_id: storeId, name: f.name, price: Number(f.price) || 0, stock: Number(f.stock) || 0, min_stock: Number(f.min_stock) || 0 };
      if (f.id) await api('ms_products?id=eq.' + f.id, { method: 'PATCH', headers: minH, body: JSON.stringify(Object.assign({}, body, { updated_at: new Date().toISOString() })) });
      else await api('ms_products', { method: 'POST', headers: minH, body: JSON.stringify(body) });
      setEdit(null); await loadProducts(storeId); flash('✓ Barang tersimpan');
    };
    const restock = async p => { const n = window.prompt('Tambah stok masuk untuk "' + p.name + '" (pcs):', '0'); const a = parseInt(n, 10); if (!a) return; await api('ms_products?id=eq.' + p.id, { method: 'PATCH', headers: minH, body: JSON.stringify({ stock: Number(p.stock) + a }) }); await loadProducts(storeId); flash('✓ Stok "' + p.name + '" +' + a); };

    function ProductForm() {
      const [f, setF] = useState(edit); const on = (k, v) => setF(x => Object.assign({}, x, { [k]: v }));
      return (
        <div className="border border-brand-300 bg-brand-50/40 rounded-xl p-3 mb-3 grid grid-cols-2 gap-2">
          <input placeholder="Nama barang" value={f.name || ''} onChange={e => on('name', e.target.value)} className={fld + ' col-span-2'} />
          <input placeholder="Harga (Rp)" type="number" value={f.price} onChange={e => on('price', e.target.value)} className={fld} />
          <input placeholder="Stok" type="number" value={f.stock} onChange={e => on('stock', e.target.value)} className={fld} />
          <input placeholder="Stok minimum (alert)" type="number" value={f.min_stock} onChange={e => on('min_stock', e.target.value)} className={fld + ' col-span-2'} />
          <div className="col-span-2 flex gap-2">
            <button onClick={() => saveProduct(f)} disabled={!f.name} className="bg-brand-600 disabled:opacity-40 text-white px-4 py-2 rounded-lg text-sm font-semibold">Simpan</button>
            <button onClick={() => setEdit(null)} className="text-slate-500 px-3 py-2 text-sm">Batal</button>
          </div>
        </div>
      );
    }
    const TabBtn = ({ id, label, icon }) => (
      <button onClick={() => setTab(id)} className={'px-3.5 py-2 rounded-lg text-sm font-medium whitespace-nowrap ' + (tab === id ? 'bg-brand-600 text-white' : 'text-slate-500 hover:bg-slate-100')}>{icon} {label}</button>
    );

    if (busy && !stores.length) return <Card className="p-6 text-center text-slate-400">Memuat…</Card>;
    if (!isSA && !myStore) return <Card className="p-6 text-sm text-slate-300">🔒 Akun kamu belum ditugaskan ke mini store mana pun. Hubungi Super Admin untuk diatur dulu.</Card>;
    if (!store) return <Card className="p-6 text-center text-slate-400">Belum ada mini store.</Card>;

    const rep = report || []; const M = {};
    rep.forEach(r => { if (!M[r.mon]) M[r.mon] = { w: [0, 0, 0, 0], qty: 0, tot: 0 }; M[r.mon].w[r.wk - 1] = Number(r.total); M[r.mon].qty += Number(r.qty); M[r.mon].tot += Number(r.total); });
    const ml = Object.keys(M).map(Number).sort((a, b) => a - b);
    const gTot = ml.reduce((s, m) => s + M[m].tot, 0), gQty = ml.reduce((s, m) => s + M[m].qty, 0);
    const cut = v => Math.round(v * commission / 100);

    return (
      <div className="space-y-4">
        {msg && <div className="fixed bottom-5 left-1/2 -translate-x-1/2 z-50 bg-green-600 text-white text-sm font-semibold px-4 py-2.5 rounded-lg shadow-lg">{msg}</div>}
        <Card className="p-3 sm:p-4 flex flex-col sm:flex-row sm:items-center gap-3">
          <div className="flex items-center gap-2 min-w-0">
            <span className="text-xl">🏪</span>
            {isSA
              ? <select value={storeId || ''} onChange={e => setStoreId(Number(e.target.value))} className={fld + ' font-semibold'}>{stores.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}</select>
              : <div className="font-bold text-slate-900 truncate">{store.name}</div>}
            <span className="text-[11px] text-slate-400 hidden sm:inline">potongan {commission}%</span>
          </div>
          <div className="flex gap-1.5 sm:ml-auto overflow-x-auto -mx-1 px-1">
            <TabBtn id="kasir" icon="🛒" label="Kasir" /><TabBtn id="barang" icon="📦" label="Barang" />
            <TabBtn id="riwayat" icon="🧾" label="Riwayat" /><TabBtn id="report" icon="📊" label="Report" />
          </div>
        </Card>

        {tab === 'kasir' && (
          <div className="flex flex-col lg:flex-row gap-4">
            <div className="flex-1 min-w-0">
              {products.length === 0
                ? <Card className="p-6 text-center text-sm text-slate-400">Belum ada barang. Tambah dulu di tab <b>Barang</b>.</Card>
                : <div className="grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-4 gap-2.5">
                    {products.map(p => { const q = cart[p.id] || 0; const out = Number(p.stock) <= 0; const low = Number(p.stock) <= Number(p.min_stock) && !out;
                      return (
                        <button key={p.id} disabled={out} onClick={() => add(p)} className={'relative text-left border rounded-xl p-3 ' + (out ? 'opacity-40 border-slate-200' : 'border-slate-200 hover:border-brand-400 active:scale-[.97] transition')}>
                          {q > 0 && <span className="absolute top-1.5 right-1.5 bg-brand-600 text-white text-xs font-bold w-5 h-5 rounded-full flex items-center justify-center">{q}</span>}
                          <div className="text-sm font-semibold text-slate-800 leading-tight min-h-[34px]">{p.name}</div>
                          <div className="text-brand-600 font-bold text-sm mt-1">{rp(p.price)}</div>
                          <div className={'text-[11px] mt-0.5 ' + (low || out ? 'text-rose-500' : 'text-slate-400')}>stok {p.stock}{low ? ' 🔴' : ''}{out ? ' · habis' : ''}</div>
                        </button>);
                    })}
                  </div>}
            </div>
            <div className="lg:w-80 shrink-0">
              <Card className="p-4 lg:sticky lg:top-4">
                <h3 className="font-bold text-slate-900 mb-2">Keranjang</h3>
                {inCart.length === 0
                  ? <p className="text-sm text-slate-400 py-5 text-center">Tap barang buat nambah</p>
                  : <div className="space-y-2">
                      {inCart.map(p => (
                        <div key={p.id} className="flex items-center gap-2 text-sm">
                          <div className="flex-1 min-w-0"><div className="truncate text-slate-700">{p.name}</div><div className="text-xs text-slate-400">{rp(Number(p.price) * cart[p.id])}</div></div>
                          <button onClick={() => dec(p)} className="w-7 h-7 rounded bg-slate-100 text-slate-600 font-bold">−</button>
                          <span className="w-6 text-center tabular-nums">{cart[p.id]}</span>
                          <button onClick={() => add(p)} className="w-7 h-7 rounded bg-slate-100 text-slate-600 font-bold">+</button>
                        </div>
                      ))}
                      <div className="border-t border-slate-100 pt-2 flex justify-between font-bold"><span>Total ({cartQty} pcs)</span><span>{rp(cartTotal)}</span></div>
                    </div>}
                <button onClick={checkout} disabled={!inCart.length || busy} className="w-full mt-3 bg-green-600 disabled:opacity-40 text-white font-bold py-3 rounded-xl">Bayar &amp; Simpan</button>
              </Card>
            </div>
          </div>
        )}

        {tab === 'barang' && (
          <Card className="p-4">
            <div className="flex items-center justify-between mb-3">
              <h3 className="font-bold text-slate-900">Kelola Barang</h3>
              <button onClick={() => setEdit({ name: '', price: '', stock: '', min_stock: '' })} className="text-sm bg-brand-600 text-white px-3 py-1.5 rounded-lg font-medium">+ Tambah Barang</button>
            </div>
            {edit && <ProductForm key={edit.id || 'new'} />}
            <div className="space-y-2">
              {products.map(p => { const low = Number(p.stock) <= Number(p.min_stock);
                return (
                  <div key={p.id} className="flex items-center gap-3 border border-slate-100 rounded-lg px-3 py-2.5">
                    <div className="flex-1 min-w-0"><div className="text-sm font-medium text-slate-800 truncate">{p.name}</div><div className="text-xs text-slate-400">{rp(p.price)}</div></div>
                    <span className={'text-xs font-mono px-2 py-1 rounded ' + (low ? 'bg-rose-50 text-rose-600' : 'bg-green-50 text-green-700')}>stok {p.stock}{low ? ' 🔴' : ''}</span>
                    <button onClick={() => restock(p)} className="text-xs text-brand-600 font-semibold">+Stok</button>
                    <button onClick={() => setEdit(p)} className="text-slate-400 text-lg leading-none">✎</button>
                  </div>);
              })}
              {products.length === 0 && <p className="text-sm text-slate-400 text-center py-4">Belum ada barang. Klik <b>+ Tambah Barang</b>.</p>}
            </div>
          </Card>
        )}

        {tab === 'riwayat' && (
          <Card className="p-4">
            <h3 className="font-bold text-slate-900 mb-3">Riwayat Transaksi <span className="text-xs font-normal text-slate-400">(50 terakhir)</span></h3>
            {sales.length === 0
              ? <p className="text-sm text-slate-400 text-center py-4">Belum ada transaksi.</p>
              : <div className="space-y-2">
                  {sales.map(s => (
                    <div key={s.id} className="border border-slate-100 rounded-lg px-3 py-2.5">
                      <div className="flex justify-between text-sm"><span className="font-semibold text-slate-800">{rp(s.total)}</span><span className="text-xs text-slate-400">{dt(s.created_at)}</span></div>
                      <div className="text-xs text-slate-500 mt-1">{(s.items || []).map(i => i.qty + '× ' + i.name).join(' · ')} · <b>{s.qty} pcs</b></div>
                    </div>
                  ))}
                </div>}
          </Card>
        )}

        {tab === 'report' && (
          <Card className="p-4">
            <div className="flex items-center justify-between mb-3 gap-2 flex-wrap">
              <h3 className="font-bold text-slate-900">Report — {store.name}</h3>
              <select value={year} onChange={e => setYear(Number(e.target.value))} className={fld}>{[year, year - 1, year - 2].map(y => <option key={y} value={y}>{y}</option>)}</select>
            </div>
            {report === null ? <p className="text-slate-400 text-sm py-4 text-center">Memuat…</p> : ml.length === 0 ? <p className="text-slate-400 text-sm py-6 text-center">Belum ada penjualan di tahun {year}.</p> : (
              <>
                <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-4">
                  <div className="rounded-xl border border-slate-100 p-3"><div className="text-[11px] text-slate-400 uppercase">Penjualan {year}</div><div className="text-lg font-extrabold text-brand-600">{rp(gTot)}</div></div>
                  <div className="rounded-xl border border-slate-100 p-3"><div className="text-[11px] text-slate-400 uppercase">Total Qty</div><div className="text-lg font-extrabold">{gQty.toLocaleString('id-ID')} pcs</div></div>
                  <div className="rounded-xl border border-slate-100 p-3"><div className="text-[11px] text-slate-400 uppercase">Potongan {commission}%</div><div className="text-lg font-extrabold text-amber-600">{rp(cut(gTot))}</div></div>
                  <div className="rounded-xl border border-slate-100 p-3"><div className="text-[11px] text-slate-400 uppercase">Disetor ke Vpx</div><div className="text-lg font-extrabold text-green-600">{rp(gTot - cut(gTot))}</div></div>
                </div>
                <div className="overflow-x-auto -mx-2">
                  <table className="min-w-full text-sm tabular-nums">
                    <thead><tr className="text-right text-[11px] text-slate-400 border-b border-slate-100">
                      <th className="text-left px-3 py-2">Bulan</th><th className="px-2 py-2">Mgg 1</th><th className="px-2 py-2">Mgg 2</th><th className="px-2 py-2">Mgg 3</th><th className="px-2 py-2">Mgg 4</th>
                      <th className="px-2 py-2">Qty</th><th className="px-3 py-2">Sub Total</th><th className="px-3 py-2">Potong {commission}%</th><th className="px-3 py-2">Disetor</th>
                    </tr></thead>
                    <tbody>
                      {ml.map(m => (
                        <tr key={m} className="text-right border-b border-slate-50">
                          <td className="text-left px-3 py-2 font-medium text-slate-700">{MONTHS[m - 1]} {year}</td>
                          {M[m].w.map((v, i) => <td key={i} className="px-2 py-2 text-slate-500">{v ? rp(v) : '–'}</td>)}
                          <td className="px-2 py-2 font-semibold">{M[m].qty}</td>
                          <td className="px-3 py-2 font-semibold text-slate-800">{rp(M[m].tot)}</td>
                          <td className="px-3 py-2 text-amber-600">{rp(cut(M[m].tot))}</td>
                          <td className="px-3 py-2 font-bold text-green-600">{rp(M[m].tot - cut(M[m].tot))}</td>
                        </tr>
                      ))}
                      <tr className="text-right font-extrabold bg-brand-50/40"><td className="text-left px-3 py-2">TOTAL</td><td colSpan="4" className="px-2 py-2 text-slate-300 text-right">{gQty} pcs →</td><td className="px-2 py-2">{gQty}</td><td className="px-3 py-2">{rp(gTot)}</td><td className="px-3 py-2 text-amber-600">{rp(cut(gTot))}</td><td className="px-3 py-2 text-green-600">{rp(gTot - cut(gTot))}</td></tr>
                    </tbody>
                  </table>
                </div>
                <p className="text-[11px] text-slate-400 mt-3">Semua kolom dihitung otomatis dari transaksi POS · potongan mitra {commission}% · minggu: 1 (01–07) · 2 (08–14) · 3 (15–21) · 4 (22–akhir).</p>
              </>
            )}
          </Card>
        )}
      </div>
    );
  }

  function App() {
    const [settings, setSettings] = useState(window.APP_SETTINGS || {});
    let vmenus = applyMenuSettings(settings, false);
    // Jabatan "Mini Store": cuma boleh lihat menu Mini Store POS (kunci wewenang)
    if (_readCookie('vpx_role') === 'Mini Store') vmenus = applyMenuSettings(settings, true).filter(m => m.label === 'Mini Store POS');
    const [menu, setMenu] = useState((vmenus[0] && vmenus[0].label) || 'Sales Performance');
    const [mobileOpen, setMobileOpen] = useState(false);
    const active = MENUS.find(m => m.label === menu) || MENUS[0];
    const pickMenu = (label) => { setMenu(label); setMobileOpen(false); };
    const saveSettings = async (partial) => { if (!isSuperAdmin()) { alert('Hanya Super Admin yang bisa mengubah Pengaturan.'); return; } const s = Object.assign({}, settings, partial); setSettings(s); await saveAppSettings(s); const vis = applyMenuSettings(s, false); if (!vis.some(m => m.label === menu)) setMenu((vis[0] && vis[0].label) || 'Sales Performance'); };
    return (
      <FilterProvider>
        <div className="min-h-screen flex">
          <Sidebar menu={menu} setMenu={setMenu} menus={vmenus} />
          <main className="flex-1 min-w-0">
            <div className="lg:hidden sticky top-0 z-30 bg-white border-b border-slate-200 flex items-center justify-between px-4 py-2.5">
              <div className="flex items-center gap-2">
                <img src="logo.png" alt="Vapexpress" className="h-6 w-auto" />
              </div>
              <button onClick={() => setMobileOpen(o => !o)} className="rounded-lg border border-slate-200 px-3 py-2 text-sm font-medium text-slate-700">&#9776; Menu</button>
            </div>
            {mobileOpen && (
              <div className="lg:hidden border-b border-slate-200 bg-white max-h-[70vh] overflow-auto">
                {vmenus.filter(m => m.label !== 'Pengaturan').map(m => (
                  <button key={m.label} onClick={() => pickMenu(m.label)}
                    className={'w-full text-left flex items-center gap-2.5 px-4 py-3 text-sm border-b border-slate-50 ' + (menu === m.label ? 'bg-brand-50 text-brand-700 font-semibold' : 'text-slate-600')}>
                    <span>{m.icon}</span><span className="flex-1">{m.display || m.label}</span>
                    {!m.ready && <span className="text-[10px] px-1.5 py-0.5 rounded bg-slate-100 text-slate-400">soon</span>}
                  </button>
                ))}
                {vmenus.filter(m => m.label === 'Pengaturan').map(m => (
                  <button key={m.label} onClick={() => pickMenu(m.label)}
                    className={'w-full text-left flex items-center gap-2.5 px-4 py-3 text-sm border-b border-slate-50 ' + (menu === m.label ? 'bg-brand-50 text-brand-700 font-semibold' : 'text-slate-600')}>
                    <span>{m.icon}</span><span className="flex-1">{m.display || m.label}</span>
                  </button>
                ))}
                <button onClick={doLogout} className="w-full text-left flex items-center gap-2.5 px-4 py-3 text-sm font-medium text-rose-600">
                  <span>&#128682;</span><span className="flex-1">Logout</span>
                </button>
              </div>
            )}
            <Header title={(settings.names && settings.names[menu]) || (menu === 'Sales Performance' ? 'Sales Performance Dashboard' : menu)} subtitle={active.sub} showExport={menu === 'Sales Performance'} />
            <div className="p-4 md:p-6 space-y-6 max-w-[1400px] mx-auto">
              {menu === 'Sales (Test API)' ? (
                <APITestModule />
              ) : menu === 'Sales (API iSeller)' ? (
                <APISellerModule settings={settings} />
              ) : menu === 'Report' ? (
                <ReportModule />
              ) : menu === 'Mini Store POS' ? (
                <MiniStorePOS />
              ) : menu === 'Sales Performance' ? (
                <>
                  <FilterBar />
                  <InsightPanel />
                  <KpiGrid />
                  <SalesChart />
                  <StoreTable />
                  <SalesTeamTable />
                  <TopSpendersTable />
                  <footer className="py-6 text-center text-xs text-slate-400">
                    {DATA_IS_REAL
                      ? `Data asli (hanya transaksi lunas/paid) · ${formatNumber(S.meta.rows)} transaksi · ${formatNumber(S.meta.customers)} pelanggan unik · ${STORES.length} toko · ${SALES_REPS.length} sales · ${DATA_MIN} s.d. ${DATA_MAX}`
                      : `Data masih contoh (dummy) · ${STORES.length} toko · ${SALES_REPS.length} sales · ${DATA_MIN} s.d. ${DATA_MAX}`}
                  </footer>
                </>
              ) : menu === 'Inventory Control & Compliance' ? (
                <InventoryModule />
              ) : menu === 'General Affair (Asset)' ? (
                <GAModule />
              ) : menu === 'Pengaturan' ? (
                <SettingsModule settings={settings} onSave={saveSettings} />
              ) : (
                <ComingSoon title={menu} />
              )}
            </div>
          </main>
        </div>
      </FilterProvider>
    );
  }

  // === Ambil data Inventory dari Supabase (database online), cadangan: file lokal inventory.js ===
  const SUPA_URL = 'https://cxfwmwfbtqvrsisjvsba.supabase.co';
  const SUPA_KEY = 'sb_publishable_DgCEITUHrSeniBTjg1mbpw_TlPtqy1X';
  async function loadInventoryFromSupabase() {
    try {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 8000);
      const res = await fetch(SUPA_URL + '/rest/v1/inventory?select=*', {
        headers: { apikey: SUPA_KEY, Authorization: 'Bearer ' + SUPA_KEY },
        signal: ctrl.signal,
      });
      clearTimeout(t);
      if (res.ok) {
        const rows = await res.json();
        if (Array.isArray(rows) && rows.length) {
          window.INVENTORY = rows.map(r => ({
            date: r.date, mc: r.mc, month: r.month, year: r.year, store: r.store,
            pic: r.pic, staff: r.staff, selisih: r.selisih, selisihFinal: r.selisih_final,
            sku: r.sku, hari: r.hari, so: r.so,
          }));
          console.log('Inventory dimuat dari Supabase:', window.INVENTORY.length, 'baris');
        }
      }
    } catch (e) {
      console.warn('Inventory Supabase gagal, pakai file lokal:', e && e.message);
    }
  }
  async function loadInventoryFromSheet() {
    try {
      const SID = '16hXIxuvROlg5HWEf_gjSatXQXnuxDUrHjXYjuD5OpZY';
      const res = await fetch('https://docs.google.com/spreadsheets/d/' + SID + '/gviz/tq?tqx=out:csv&gid=0&_=' + Date.now(), { cache: 'no-store' });
      if (!res.ok) throw new Error('http ' + res.status);
      const rows = parseCSV(await res.text());
      if (!rows.length) return;
      const H = rows[0].map(h => (h || '').trim());
      const ix = n => H.indexOf(n);
      const c = { date: ix('DATE'), mc: ix('MONTH - CUT OFF'), month: ix('MONTH'), year: ix('Year'), store: ix('STORE'), pic: ix('PIC'), staff: ix('STAFF INCHARGE'), selisih: ix('SELISIH'), selisihFinal: ix('SELISIH FINAL'), sku: ix('SELISIH SKU'), hari: ix('SELISIH HARI'), so: ix('TOTAL SO') };
      const pd = s => { const d = new Date(s); return isNaN(d) ? (s || '') : (d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0')); };
      const nm = s => { const t = String(s == null ? '' : s).replace(/[^0-9.-]/g, ''); const n = parseFloat(t); return isNaN(n) ? 0 : n; };
      const out = [];
      for (let r = 1; r < rows.length; r++) {
        const row = rows[r]; if (!row) continue;
        const store = (row[c.store] || '').trim(); if (!store) continue;
        out.push({ date: pd(row[c.date]), mc: nm(row[c.mc]), month: (row[c.month] || '').trim(), year: nm(row[c.year]), store: store, pic: (row[c.pic] || '').trim(), staff: (row[c.staff] || '').trim(), selisih: nm(row[c.selisih]), selisihFinal: nm(row[c.selisihFinal]), sku: nm(row[c.sku]), hari: nm(row[c.hari]), so: nm(row[c.so]) });
      }
      if (out.length) { window.INVENTORY = out; console.log('Inventory LIVE dari sheet:', out.length, 'baris (terakhir ' + (out[out.length - 1] || {}).date + ')'); }
    } catch (e) { console.warn('Inventory sheet gagal, pakai data cadangan:', e && e.message); }
  }
  async function loadGAFromSupabase() {
    try {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 8000);
      const res = await fetch(SUPA_URL + '/rest/v1/ga?select=*', {
        headers: { apikey: SUPA_KEY, Authorization: 'Bearer ' + SUPA_KEY },
        signal: ctrl.signal,
      });
      clearTimeout(t);
      if (res.ok) {
        const rows = await res.json();
        if (Array.isArray(rows) && rows.length) {
          window.GA = {
            meta: Object.assign({}, (window.GA && window.GA.meta) || {}, { rows: rows.length }),
            rows: rows.map(r => ({
              date: r.date, month: r.month, cabang: r.cabang, tipe: r.tipe,
              asset: r.asset, status: r.status, late: r.late,
            })),
          };
          console.log('GA dimuat dari Supabase:', window.GA.rows.length, 'baris');
        }
      }
    } catch (e) {
      console.warn('GA Supabase gagal, pakai file lokal:', e && e.message);
    }
  }
  async function loadSettings() {
    try {
      const res = await fetch(SUPA_URL + '/rest/v1/app_settings?id=eq.1&select=data', { headers: { apikey: SUPA_KEY, Authorization: 'Bearer ' + SUPA_KEY } });
      if (res.ok) { const rows = await res.json(); if (Array.isArray(rows) && rows[0] && rows[0].data) window.APP_SETTINGS = rows[0].data; }
    } catch (e) { /* pakai default */ }
  }
  async function saveAppSettings(data) {
    window.APP_SETTINGS = data;
    try {
      await fetch(SUPA_URL + '/rest/v1/app_settings?id=eq.1', { method: 'PATCH', headers: { apikey: SUPA_KEY, Authorization: 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json', Prefer: 'return=minimal' }, body: JSON.stringify({ data }) });
    } catch (e) { /* abaikan */ }
  }
  async function loadReportData() {
    try {
      const res = await fetch(SUPA_URL + '/rest/v1/report_data?select=key,data', { headers: { apikey: SUPA_KEY, Authorization: 'Bearer ' + SUPA_KEY } });
      if (res.ok) { const rows = await res.json(); const out = {}; (rows || []).forEach(r => { out[r.key] = r.data; }); window.REPORT_DATA = out; }
    } catch (e) { /* pakai default */ }
  }
  async function saveReportData(key, data) {
    window.REPORT_DATA = Object.assign({}, window.REPORT_DATA, { [key]: data });
    try {
      await fetch(SUPA_URL + '/rest/v1/report_data', { method: 'POST', headers: { apikey: SUPA_KEY, Authorization: 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json', Prefer: 'resolution=merge-duplicates,return=minimal' }, body: JSON.stringify({ key, data }) });
    } catch (e) { /* abaikan */ }
  }
  (async function bootstrap() {
    await Promise.all([loadInventoryFromSheet(), loadGAFromSupabase(), loadSettings(), loadReportData()]);
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  })();
  </script>
