  <div id="root" class="min-h-screen"><div class="min-h-screen grid place-items-center text-slate-400">Memuat dashboard…</div></div>

  <script type="text/babel" data-presets="react">
  /* =========================================================================
     SALES PERFORMANCE DASHBOARD  —  single-file React app
       1. Dummy data   2. Helpers   3. Selectors   4. FilterContext
       5. Components    6. App
     Grafik digambar dengan SVG sendiri (tanpa library chart eksternal).
     ========================================================================= */

  const { useState, useMemo, useRef, useEffect, createContext, useContext } = React;

  /* ----------------------------------------------------------------------- */
  /* 1. DUMMY DATA                                                            */
  /* ----------------------------------------------------------------------- */

  function mulberry32(a) {
    return function () {
      a |= 0; a = (a + 0x6d2b79f5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  const DUMMY_STORES = [
    { id: 'st1', name: 'Jakarta Pusat' },
    { id: 'st2', name: 'Bandung' },
    { id: 'st3', name: 'Surabaya' },
    { id: 'st4', name: 'Medan' },
    { id: 'st5', name: 'Denpasar' },
    { id: 'st6', name: 'Yogyakarta' },
  ];

  const DUMMY_REPS = [
    { id: 'sp1', name: 'Andi Pratama',   storeId: 'st1' },
    { id: 'sp2', name: 'Bunga Lestari',  storeId: 'st1' },
    { id: 'sp3', name: 'Citra Dewi',     storeId: 'st1' },
    { id: 'sp4', name: 'Dimas Saputra',  storeId: 'st2' },
    { id: 'sp5', name: 'Eka Putri',      storeId: 'st2' },
    { id: 'sp6', name: 'Fajar Nugroho',  storeId: 'st3' },
    { id: 'sp7', name: 'Gita Anggraini', storeId: 'st3' },
    { id: 'sp8', name: 'Hadi Wijaya',    storeId: 'st3' },
    { id: 'sp9', name: 'Indra Kusuma',   storeId: 'st4' },
    { id: 'sp10', name: 'Joko Susilo',   storeId: 'st4' },
    { id: 'sp11', name: 'Kartika Sari',  storeId: 'st5' },
    { id: 'sp12', name: 'Lina Marlina',  storeId: 'st5' },
    { id: 'sp13', name: 'Maya Putri',    storeId: 'st6' },
    { id: 'sp14', name: 'Nanda Pradana', storeId: 'st6' },
    { id: 'sp15', name: 'Oscar Halim',   storeId: 'st6' },
  ];

  function generateData() {
    const rng = mulberry32(20260621);
    const factor = { st1: 1.40, st2: 1.00, st3: 1.15, st4: 0.70, st5: 0.95, st6: 0.60 };
    const slope  = { st1: 0.28, st2: -0.08, st3: 0.15, st4: -0.22, st5: 0.05, st6: 0.33 };
    const DAYS = 180;
    const END = '2026-06-21';
    const records = [];
    for (let i = 0; i < DAYS; i++) {
      const date = addDays(END, -(DAYS - 1 - i));
      const dow = new Date(date + 'T00:00:00').getDay();
      const season = dow === 0 || dow === 6 ? 1.25 : dow === 5 ? 1.1 : 1;
      const progress = i / (DAYS - 1);
      for (const rep of DUMMY_REPS) {
        const sf = factor[rep.storeId];
        const trend = 1 + slope[rep.storeId] * progress;
        const invoices = Math.max(1, Math.round((8 + rng() * 30) * sf * trend * season * (0.85 + rng() * 0.3)));
        const avgTicket = 150000 + rng() * 250000;
        const sales = Math.round(invoices * avgTicket);
        const customers = Math.max(1, Math.round(invoices * (0.6 + rng() * 0.25)));
        records.push({ date, storeId: rep.storeId, salesId: rep.id, sales, customers, invoices });
      }
    }
    return records;
  }

  /* ----------------------------------------------------------------------- */
  /* 2. HELPERS                                                               */
  /* ----------------------------------------------------------------------- */

  const _idr = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 });
  const _num = new Intl.NumberFormat('id-ID');
  const formatCurrency = v => _idr.format(Math.round(v || 0));
  const formatNumber = v => _num.format(Math.round(v || 0));
  // Angka ditampilkan penuh (tanpa singkatan), mis. "Rp 3.000.000.000".
  function formatCurrencyShort(v) { return formatCurrency(v); }
  const formatPercent = v => (v >= 0 ? '+' : '') + (v || 0).toFixed(2) + '%';

  const MONTHS = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  // Format a Date using LOCAL parts (avoids the UTC off-by-one from toISOString).
  function ymd(d) {
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }
  function addDays(iso, n) {
    const d = new Date(iso + 'T00:00:00');
    d.setDate(d.getDate() + n);
    return ymd(d);
  }
  function diffDays(a, b) {
    return Math.round((new Date(b + 'T00:00:00') - new Date(a + 'T00:00:00')) / 86400000);
  }
  function dayLabel(iso) {
    const d = new Date(iso + 'T00:00:00');
    return d.getDate() + ' ' + MONTHS[d.getMonth()];
  }
  function monthLabel(key) {
    const [y, m] = key.split('-');
    return MONTHS[parseInt(m, 10) - 1] + ' ' + y.slice(2);
  }
  function weekMonday(iso) {
    const d = new Date(iso + 'T00:00:00');
    const day = (d.getDay() + 6) % 7;
    d.setDate(d.getDate() - day);
    return ymd(d);
  }

  // Pilih sumber data: ringkasan ASLI (data.js) bila ada, kalau tidak pakai contoh.
  const S = window.SALES_SUMMARY || null;
  let STORES, SALES_REPS, RECORDS, DATA_MIN, DATA_MAX, DATA_IS_REAL;
  if (S) {
    DATA_IS_REAL = true;
    STORES = S.stores.map((n, i) => ({ id: 'st' + i, name: n }));
    SALES_REPS = S.employees.map((e, i) => ({ id: 'sp' + i, name: e[0], storeId: 'st' + e[1] }));
    RECORDS = S.daily.map(a => ({ date: S.dates[a[0]], storeId: 'st' + a[1], salesId: 'sp' + a[2], sales: a[3], invoices: a[4], custs: a[5] }));
    DATA_MIN = S.meta.dateMin; DATA_MAX = S.meta.dateMax;
  } else {
    DATA_IS_REAL = false;
    STORES = DUMMY_STORES; SALES_REPS = DUMMY_REPS;
    RECORDS = generateData();
    DATA_MIN = RECORDS[0].date; DATA_MAX = RECORDS[RECORDS.length - 1].date;
  }

  const _normName = s => String(s || '').toUpperCase().replace(/\s+/g, ' ').trim();

  // Toko nonaktif: dihapus dari dashboard (data & filter diabaikan).
  const EXCLUDED_STORE_NAMES = new Set(['VAPELAH CILEBUT', 'VAPELAH KAYURINGIN', 'VAPEXPRESS BINTARO', 'VAPEXPRESS RAWA BELONG']);
  let EXCLUDED_STORE_IDX = new Set();
  if (DATA_IS_REAL) {
    const exIds = new Set(STORES.filter(s => EXCLUDED_STORE_NAMES.has(_normName(s.name))).map(s => s.id));
    EXCLUDED_STORE_IDX = new Set([...exIds].map(id => parseInt(id.slice(2), 10)));
    STORES = STORES.filter(s => !exIds.has(s.id));
    RECORDS = RECORDS.filter(r => !exIds.has(r.storeId));
  }

  // Sales tanpa transaksi di bulan terakhir data (mis. Juni) tidak muncul di filter.
  const LAST_MONTH = DATA_MAX.slice(0, 7);
  const ACTIVE_SALES = new Set(RECORDS.filter(r => r.date.slice(0, 7) === LAST_MONTH).map(r => r.salesId));

  const STORE_NAME = Object.fromEntries(STORES.map(s => [s.id, s.name]));

  // ---- Pembagian AREA (toko dikelompokkan per area) ----
  const AREA_DEFS = {
    'Area 1': ['Vapelah Bondes', 'Vapexpress bangbarung', 'Vapexpress lodaya', 'Vapexpress sukasari', 'Vapexpress air mancur', 'Vapexpress leuwiliang', 'Vapexpress dramaga', 'Vapexpress cimanggu'],
    'Area 2': ['Vapexpress Kedung Halang', 'Vapexpress Pakansari', 'Vapexpress cilebut', 'Vapexpress citeureup', 'Vapexpress cibinong'],
    'Area 3': ['Vapexpress bukit dago', 'Vapexpress parung', 'Vapexpress pasir kuda', 'Vapexpress pancasan', 'Vapelah Ciomas'],
    'Area 4': ['Vapexpress Kali abang', 'Vapexpress Harapan Indah', 'Vapexpress Pondok Gede', 'Vapelah Cipayung'],
  };
  const _areaByNorm = {};
  Object.keys(AREA_DEFS).forEach(a => AREA_DEFS[a].forEach(n => { _areaByNorm[_normName(n)] = a; }));
  const STORE_AREA = {};
  STORES.forEach(s => { STORE_AREA[s.id] = _areaByNorm[_normName(s.name)] || 'Lainnya'; });
  const AREA_STORE_IDS = {};
  ['Area 1', 'Area 2', 'Area 3', 'Area 4', 'Lainnya'].forEach(a => {
    const ids = STORES.filter(s => STORE_AREA[s.id] === a).map(s => s.id);
    if (ids.length) AREA_STORE_IDS[a] = ids;
  });
  const AREA_LIST = Object.keys(AREA_STORE_IDS); // hanya area yang punya toko
  function withArea(f) {
    return { ...f, areaStores: (f.areaId && f.areaId !== 'all' && AREA_STORE_IDS[f.areaId]) ? new Set(AREA_STORE_IDS[f.areaId]) : null };
  }

  /* ----------------------------------------------------------------------- */
  /* 3. SELECTORS                                                             */
  /* ----------------------------------------------------------------------- */

  function filterRecords(recs, f) {
    return recs.filter(r =>
      r.date >= f.startDate && r.date <= f.endDate &&
      (f.salesId === 'all' || r.salesId === f.salesId) &&
      (f.storeId !== 'all' ? r.storeId === f.storeId : (!f.areaStores || f.areaStores.has(r.storeId)))
    );
  }
  // Mundur n bulan dengan tanggal yang sama (kalau bulan tujuan lebih pendek, ambil tanggal terakhir).
  function addMonths(iso, n) {
    const d = new Date(iso + 'T00:00:00');
    const day = d.getDate();
    d.setDate(1);
    d.setMonth(d.getMonth() + n);
    const lastDay = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
    d.setDate(Math.min(day, lastDay));
    return ymd(d);
  }
  // Periode pembanding = rentang yang sama persis, satu bulan lebih awal (tanggal sama).
  function previousRange(start, end) {
    return { start: addMonths(start, -1), end: addMonths(end, -1) };
  }
  // Mundur n tahun dengan tanggal yang sama (untuk perbandingan tahunan / YoY).
  function addYears(iso, n) {
    const d = new Date(iso + 'T00:00:00');
    d.setFullYear(d.getFullYear() + n);
    return ymd(d);
  }
  function aggregate(recs) {
    let sales = 0, invoices = 0, custCount = 0;
    const cset = new Set();
    for (const r of recs) {
      sales += r.sales; invoices += r.invoices;
      if (r.custs) { for (const c of r.custs) cset.add(c); } else { custCount += r.customers || 0; }
    }
    const customers = cset.size + custCount; // jumlah pelanggan = HP unik
    return { sales, invoices, customers, avgInvoice: invoices ? sales / invoices : 0, avgCustomer: customers ? sales / customers : 0 };
  }
  const growth = (cur, prev) => (prev ? ((cur - prev) / prev) * 100 : cur > 0 ? 100 : 0);

  function trendBuckets(recs, gran) {
    const map = new Map();
    for (const r of recs) {
      let key, label;
      if (gran === 'monthly') { key = r.date.slice(0, 7); label = monthLabel(key); }
      else if (gran === 'weekly') { key = weekMonday(r.date); label = dayLabel(key); }
      else { key = r.date; label = dayLabel(r.date); }
      if (!map.has(key)) map.set(key, { key, label, sales: 0 });
      map.get(key).sales += r.sales;
    }
    return [...map.values()].sort((a, b) => (a.key < b.key ? -1 : 1));
  }
  function comparisonSeries(cur, prev, gran) {
    const a = trendBuckets(cur, gran);
    const b = trendBuckets(prev, gran);
    return a.map((d, i) => ({ label: d.label, current: d.sales, previous: b[i] ? b[i].sales : null }));
  }
  function groupPerf(cur, prev, keyField, nameFn) {
    const build = recs => {
      const m = new Map();
      for (const r of recs) {
        const id = r[keyField];
        let o = m.get(id);
        if (!o) { o = { id, sales: 0, invoices: 0, custCount: 0, cset: new Set() }; m.set(id, o); }
        o.sales += r.sales; o.invoices += r.invoices;
        if (r.custs) { for (const c of r.custs) o.cset.add(c); } else { o.custCount += r.customers || 0; }
      }
      for (const o of m.values()) o.customers = o.cset.size + o.custCount;
      return m;
    };
    const cm = build(cur), pm = build(prev);
    return [...cm.values()].map(o => ({
      ...o, ...nameFn(o.id),
      growth: growth(o.sales, pm.has(o.id) ? pm.get(o.id).sales : 0),
    })).sort((a, b) => b.sales - a.sales);
  }
  const storePerf = (cur, prev) => groupPerf(cur, prev, 'storeId', id => ({ name: STORE_NAME[id] }));
  const salesPerf = (cur, prev) => groupPerf(cur, prev, 'salesId', id => {
    const rep = SALES_REPS.find(r => r.id === id);
    return { name: rep ? rep.name : id, store: rep ? STORE_NAME[rep.storeId] : '', storeId: rep ? rep.storeId : '' };
  });

  function buildInsights(cur, prev) {
    const sp = storePerf(cur, prev);
    const reps = salesPerf(cur, prev);
    const out = [];
    if (!sp.length) return out;
    const top = sp[0];
    out.push({ type: 'positive', icon: '🏆', title: 'Toko terbaik periode ini',
      detail: `${top.name} memimpin dengan penjualan ${formatCurrencyShort(top.sales)} (${formatPercent(top.growth)} vs periode lalu).` });
    const drops = sp.filter(s => s.growth < 0).sort((a, b) => a.growth - b.growth);
    if (drops.length) {
      const w = drops[0];
      out.push({ type: 'negative', icon: '⚠️', title: 'Perlu perhatian',
        detail: `Penjualan ${w.name} turun ${Math.abs(w.growth).toFixed(2)}% dibanding periode sebelumnya.` });
    }
    const gain = [...reps].filter(r => isFinite(r.growth)).sort((a, b) => b.growth - a.growth)[0];
    if (gain && gain.growth > 0) {
      out.push({ type: 'positive', icon: '🚀', title: 'Sales paling melesat',
        detail: `${gain.name} naik ${gain.growth.toFixed(2)}% — penjualan ${formatCurrencyShort(gain.sales)}.` });
    }
    const g = growth(aggregate(cur).sales, aggregate(prev).sales);
    out.push({ type: g >= 0 ? 'positive' : 'negative', icon: g >= 0 ? '📈' : '📉', title: 'Pertumbuhan total',
      detail: `Total penjualan ${g >= 0 ? 'naik' : 'turun'} ${Math.abs(g).toFixed(2)}% dibanding periode sebelumnya.` });
    return out;
  }

  /* ----------------------------------------------------------------------- */
  /* 4. FILTER CONTEXT                                                        */
  /* ----------------------------------------------------------------------- */

  const FilterContext = createContext(null);
  const useFilters = () => useContext(FilterContext);

  function FilterProvider({ children }) {
    // Default: tanggal 1 (bulan dari data terakhir) s.d. tanggal terakhir data.
    const defaults = { startDate: DATA_MAX.slice(0, 8) + '01', endDate: DATA_MAX, areaId: 'all', storeId: 'all', salesId: 'all' };
    const [filters, setFilters] = useState(defaults);
    const setFilter = (key, value) => setFilters(prev => {
      const next = { ...prev, [key]: value };
      if (key === 'areaId') { next.storeId = 'all'; next.salesId = 'all'; }
      if (key === 'storeId') next.salesId = 'all';
      return next;
    });
    const reset = () => setFilters(defaults);
    const filteredRecords = useMemo(() => filterRecords(RECORDS, withArea(filters)), [filters]);
    const previousRecords = useMemo(() => {
      const pr = previousRange(filters.startDate, filters.endDate);
      return filterRecords(RECORDS, withArea({ ...filters, startDate: pr.start, endDate: pr.end }));
    }, [filters]);
    const lastYearRecords = useMemo(() => {
      return filterRecords(RECORDS, withArea({ ...filters, startDate: addYears(filters.startDate, -1), endDate: addYears(filters.endDate, -1) }));
    }, [filters]);
    const value = { filters, setFilter, reset, filteredRecords, previousRecords, lastYearRecords };
    return <FilterContext.Provider value={value}>{children}</FilterContext.Provider>;
  }

  /* ----------------------------------------------------------------------- */
  /* 5. COMPONENTS                                                            */
  /* ----------------------------------------------------------------------- */

  function Card({ className = '', children }) {
    return <div className={'bg-white rounded-2xl shadow-sm border border-slate-100 ' + className}>{children}</div>;
  }

  function ChangeBadge({ pct }) {
    const up = pct >= 0;
    const cls = up ? 'text-green-600 bg-green-50' : 'text-red-600 bg-red-50';
    return (
      <span className={`inline-flex items-center gap-1 rounded-full font-semibold text-xs px-2 py-0.5 ${cls}`}>
        <span>{up ? '▲' : '▼'}</span>{Math.abs(pct).toFixed(2)}%
      </span>
    );
  }

  function KpiCard({ label, value, changePct, accent, hint }) {
    const dot = { brand: 'bg-brand-500', green: 'bg-green-500', amber: 'bg-amber-500', violet: 'bg-violet-500', sky: 'bg-sky-500', rose: 'bg-rose-500' }[accent] || 'bg-brand-500';
    return (
      <Card className="p-5">
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-2 text-slate-500 text-sm font-medium">
            <span className={`h-2.5 w-2.5 rounded-full ${dot}`}></span>{label}
          </div>
          {changePct !== undefined && <ChangeBadge pct={changePct} />}
        </div>
        <div className="mt-3 text-xl font-extrabold tracking-tight tabular-nums text-slate-900 break-words">{value}</div>
        <div className="mt-1 text-xs text-slate-400">{hint || 'vs periode sebelumnya'}</div>
      </Card>
    );
  }

  function KpiGrid() {
    const { filteredRecords, previousRecords, lastYearRecords } = useFilters();
    const cur = aggregate(filteredRecords);
    const prev = aggregate(previousRecords);
    const ly = aggregate(lastYearRecords);
    const hasLY = ly.sales > 0;
    const yoy = growth(cur.sales, ly.sales);
    const g = {
      sales: growth(cur.sales, prev.sales),
      customers: growth(cur.customers, prev.customers),
      invoices: growth(cur.invoices, prev.invoices),
      avgInvoice: growth(cur.avgInvoice, prev.avgInvoice),
      avgCustomer: growth(cur.avgCustomer, prev.avgCustomer),
    };
    const cards = [
      { label: 'Total Penjualan', value: formatCurrencyShort(cur.sales), changePct: g.sales, accent: 'brand' },

  // --- Sales chart: bar + label nilai + garis tren (gaya referensi) -------
  // Regresi polinomial (least-squares) untuk garis tren yang halus.
  function polyfit(ys, deg) {
    const n = ys.length;
    if (!n) return { coef: [0], n: 0 };
    deg = Math.max(1, Math.min(deg, n - 1));
    const xs = ys.map((_, i) => (n > 1 ? i / (n - 1) : 0));
    const m = deg + 1;
    const sx = new Array(2 * deg + 1).fill(0);
    for (let i = 0; i < n; i++) { let p = 1; for (let k = 0; k <= 2 * deg; k++) { sx[k] += p; p *= xs[i]; } }
    const sxy = new Array(m).fill(0);
    for (let i = 0; i < n; i++) { let p = 1; for (let k = 0; k < m; k++) { sxy[k] += ys[i] * p; p *= xs[i]; } }
    const A = [];
    for (let r = 0; r < m; r++) { const row = []; for (let c = 0; c < m; c++) row.push(sx[r + c]); row.push(sxy[r]); A.push(row); }
    for (let col = 0; col < m; col++) {
      let piv = col; for (let r = col + 1; r < m; r++) if (Math.abs(A[r][col]) > Math.abs(A[piv][col])) piv = r;
      const tmp = A[col]; A[col] = A[piv]; A[piv] = tmp;
      const d = A[col][col]; if (Math.abs(d) < 1e-12) continue;
      for (let c = col; c <= m; c++) A[col][c] /= d;
      for (let r = 0; r < m; r++) if (r !== col) { const f = A[r][col]; for (let c = col; c <= m; c++) A[r][c] -= f * A[col][c]; }
    }
    return { coef: A.map(row => row[m]), n };
  }
  function polyval(fit, i) { const t = fit.n > 1 ? i / (fit.n - 1) : 0; let p = 1, y = 0; for (let k = 0; k < fit.coef.length; k++) { y += fit.coef[k] * p; p *= t; } return y; }
  // Skala sumbu Y otomatis dengan angka "bulat" (mis. kelipatan 10 juta).
  function niceAxis(min, max, ticks) {
    if (min === max) { min = min * 0.9; max = max * 1.1 || 1; }
    const range = (max - min) || 1;
    const rawStep = range / (ticks - 1);
    const mag = Math.pow(10, Math.floor(Math.log10(rawStep)));
    const norm = rawStep / mag;
    const step = (norm <= 1 ? 1 : norm <= 2 ? 2 : norm <= 2.5 ? 2.5 : norm <= 5 ? 5 : 10) * mag;
    return { min: Math.floor(min / step) * step, max: Math.ceil(max / step) * step, step };
  }
  function barLabel(v) {
    if (v >= 1e9) return (v / 1e9).toFixed(1).replace('.', ',') + ' M';
    if (v >= 1e6) return (v / 1e6).toFixed(1).replace('.', ',') + ' jt';
    if (v >= 1e3) return Math.round(v / 1e3) + ' rb';
    return '' + Math.round(v);
  }

  function SalesChart() {
    const { filteredRecords } = useFilters();
    const [gran, setGran] = useState('daily');
    const data = useMemo(() => trendBuckets(filteredRecords, gran), [filteredRecords, gran]);

    const wrapRef = useRef(null);
    const [w, setW] = useState(820);
    useEffect(() => {
      if (!wrapRef.current || typeof ResizeObserver === 'undefined') return;
      const ro = new ResizeObserver(entries => setW(entries[0].contentRect.width));
      ro.observe(wrapRef.current);
      return () => ro.disconnect();
    }, []);

    const H = 360, padL = 122, padR = 16, padT = 26, padB = 34;
    const innerW = Math.max(40, w - padL - padR);
    const innerH = H - padT - padB;
    const n = data.length || 1;
    const sales = data.map(d => d.sales);
    const rawMin = data.length ? Math.min(...sales) : 0;
    const rawMax = data.length ? Math.max(...sales) : 1;
    const axis = niceAxis(rawMin, rawMax, 6);
    const yMin = axis.min, yMax = (axis.max > axis.min ? axis.max : axis.min + 1);
    const slot = innerW / n;
    const barW = Math.max(4, Math.min(46, slot * 0.6));
    const xPos = i => padL + slot * i + slot / 2;
    const yPos = v => padT + innerH - ((v - yMin) / (yMax - yMin)) * innerH;
    const labelEvery = Math.max(1, Math.ceil(40 / slot));
    const xLabelEvery = Math.max(1, Math.ceil((w < 520 ? 58 : 42) / slot));

    const ticks = [];
    for (let t = yMin; t <= yMax + 1e-6; t += axis.step) ticks.push(t);

    const fit = useMemo(() => polyfit(sales, 3), [data]);
    const SAMPLES = Math.min(160, Math.max(2, n * 6));
    let trendPts = '';
    if (data.length >= 2) {
      const pts = [];
      for (let s = 0; s <= SAMPLES; s++) {
        const i = (s / SAMPLES) * (n - 1);
        let v = polyval(fit, i);
        v = Math.max(yMin, Math.min(yMax, v));
        pts.push(`${xPos(i)},${yPos(v)}`);
      }
      trendPts = pts.join(' ');
    }

    const tabs = [['daily', 'Harian'], ['weekly', 'Mingguan'], ['monthly', 'Bulanan']];

    return (
      <Card className="p-4 sm:p-5">
        <div className="flex flex-wrap items-center justify-between gap-3 mb-3">
          <div>
            <h2 className="font-bold text-slate-900">Tren Penjualan</h2>
            <div className="flex items-center gap-4 text-xs text-slate-400 mt-1">
              <span className="inline-flex items-center gap-1"><span className="inline-block h-2.5 w-3 rounded-sm bg-brand-500"></span>Penjualan</span>
              <span className="inline-flex items-center gap-1"><span className="inline-block h-0.5 w-4 bg-red-500"></span>Garis tren</span>
            </div>
          </div>
          <div className="inline-flex rounded-lg bg-slate-100 p-1">
            {tabs.map(([key, txt]) => (
              <button key={key} onClick={() => setGran(key)}
                className={'px-3 py-1.5 text-sm rounded-md font-medium ' + (gran === key ? 'bg-white shadow text-brand-600' : 'text-slate-500')}>
                {txt}
              </button>
            ))}
          </div>
        </div>

        <div ref={wrapRef} style={{ width: '100%' }}>
          {data.length ? (
            <svg width={w} height={H} role="img">
              {ticks.map((t, i) => {
                const yy = yPos(t);
                return (
                  <g key={i}>
                    <line x1={padL} y1={yy} x2={w - padR} y2={yy} stroke="#334155" />
                    <text x={padL - 8} y={yy + 4} textAnchor="end" fontSize="10" fill="#94a3b8">{formatCurrency(t)}</text>
                  </g>
                );
              })}
              {data.map((d, i) => {
                const barH = Math.max(0, yPos(yMin) - yPos(d.sales));
                return (
                  <g key={i}>
                    <title>{`${d.label}: ${formatCurrency(d.sales)}`}</title>
                    <rect x={xPos(i) - barW / 2} y={yPos(d.sales)} width={barW} height={barH} rx="3" fill="#3b82f6" />
                  </g>
                );
              })}
              {data.map((d, i) => (i % labelEvery === 0 ?
                <text key={'l' + i} x={xPos(i)} y={yPos(d.sales) - 6} textAnchor="middle" fontSize="10" fontWeight="600" fill="#cbd5e1">{barLabel(d.sales)}</text> : null))}
              {trendPts && <polyline points={trendPts} fill="none" stroke="#ef4444" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />}
              {data.map((d, i) => (i % xLabelEvery === 0 ?
                <text key={'x' + i} x={xPos(i)} y={H - 10} textAnchor="middle" fontSize="11" fill="#94a3b8">{d.label}</text> : null))}
            </svg>
          ) : (
            <div className="h-[360px] grid place-items-center text-sm text-slate-400">Tidak ada data untuk filter ini.</div>
          )}
        </div>
      </Card>
    );
  }

  // --- Pelanggan Top Spender (mengikuti rentang tanggal di filter atas) -----
  function TopSpendersTable() {
    const { filters } = useFilters();
    const S = window.SALES_SUMMARY;
    const top = useMemo(() => {
      if (!S || !S.custDaily) return [];
      const a = filters.startDate, b = filters.endDate;
      // toko yang diizinkan (ikut filter Toko/Area di atas), sebagai indeks toko (0..n)
      let allowed = null;
      if (filters.storeId !== 'all') allowed = new Set([parseInt(filters.storeId.slice(2), 10)]);
      else if (filters.areaId !== 'all' && AREA_STORE_IDS[filters.areaId]) allowed = new Set(AREA_STORE_IDS[filters.areaId].map(id => parseInt(id.slice(2), 10)));
      const cd = S.custDaily, dt = S.dates;
      const agg = new Map();
      for (let i = 0; i < cd.length; i++) {
        const r = cd[i]; const d = dt[r[1]];
        if (d < a || d > b) continue;
        const st = r[2];
        if (EXCLUDED_STORE_IDX.has(st)) continue;
        if (allowed && !allowed.has(st)) continue;
        let o = agg.get(r[0]); if (!o) { o = { spend: 0, count: 0, ss: {}, best: -1, bestV: -1 }; agg.set(r[0], o); }
        o.spend += r[3]; o.count += r[4];
        const v = (o.ss[st] = (o.ss[st] || 0) + r[3]);
        if (v > o.bestV) { o.bestV = v; o.best = st; }
      }
      const arr = []; agg.forEach((o, cid) => arr.push([cid, o.spend, o.count, o.best]));
      arr.sort((x, y) => y[1] - x[1]);
      return arr.slice(0, 50);
    }, [filters.startDate, filters.endDate, filters.areaId, filters.storeId]);

    if (!S || !S.custMeta) return null; // tidak tampil saat pakai data contoh

  // Grafik batang horizontal (mendukung nilai negatif: bar memanjang ke kiri).
  function HBar({ rows, fmt }) {
    const wrapRef = useRef(null); const [w, setW] = useState(620);
    useEffect(() => { if (!wrapRef.current || typeof ResizeObserver === 'undefined') return; const ro = new ResizeObserver(e => setW(e[0].contentRect.width)); ro.observe(wrapRef.current); return () => ro.disconnect(); }, []);
    const rowH = 34, padT = 8, padB = 8, padL = 100, padR = 74;
    const H = padT + padB + Math.max(rows.length, 1) * rowH;
    const innerW = Math.max(40, w - padL - padR);
    const scale = Math.max(1, ...rows.map(r => Math.abs(r.value)));
    return (
      <div ref={wrapRef} style={{ width: '100%' }}>
        {rows.length ? (
          <svg width={w} height={H}>
            {rows.map((r, i) => {
              const cy = padT + i * rowH + rowH / 2;
              const bw = Math.max(1, (Math.abs(r.value) / scale) * innerW);
              const inside = bw > 64;
              return (
                <g key={i}>
                  <text x={padL - 8} y={cy + 4} textAnchor="end" fontSize="12" fill="#94a3b8">{r.label}</text>
                  <rect x={padL} y={cy - 9} width={bw} height={18} rx="3" fill="#3b82f6" />
                  <text x={inside ? padL + bw - 6 : padL + bw + 6} y={cy + 4} textAnchor={inside ? 'end' : 'start'} fontSize="11" fontWeight="600" fill={inside ? '#ffffff' : '#cbd5e1'}>{fmt(r.value)}</text>
                </g>
              );
            })}
          </svg>
        ) : <div className="h-40 grid place-items-center text-sm text-slate-400">Tidak ada data.</div>}
      </div>
    );
  }

  function InventoryModule() {
    // Hanya tampilkan toko yang masih aktif = muncul di 2 periode cut-off TERBARU (dinamis,

    const DATA = useMemo(() => {
      const all = (window.INVENTORY || []).map(r => ({ ...r, store: _normName(r.store) }));
      const per = r => (r.year || 0) * 100 + (MONTH_NUM[r.month] || 0);
      const periods = [...new Set(all.map(per))].sort((a, b) => b - a);
      const recent = new Set(periods.slice(0, 2));
      const activeStores = new Set(all.filter(r => recent.has(per(r))).map(r => r.store));
      return all.filter(r => activeStores.has(r.store));
    }, []);
    const [month, setMonth] = useState('all');
    const [area, setArea] = useState('all');
    const [store, setStore] = useState('all');
    const [sort, setSort] = useState({ key: 'selisih', dir: 'asc' });
    const [open, setOpen] = useState({});
    const toggle = mo => setOpen(p => ({ ...p, [mo]: !p[mo] }));

    const areaOf = s => _areaByNorm[s] || 'Lainnya';
    const stores = useMemo(() => [...new Set(DATA.map(r => r.store))].sort(), []);
    const areaList = useMemo(() => { const p = new Set(DATA.map(r => areaOf(r.store))); return ['Area 1', 'Area 2', 'Area 3', 'Area 4', 'Lainnya'].filter(a => p.has(a)); }, []);
    const storesForArea = area === 'all' ? stores : stores.filter(s => areaOf(s) === area);
    const months = useMemo(() => [...new Set(DATA.map(r => r.month))].sort((a, b) => (MONTH_NUM[a] || 0) - (MONTH_NUM[b] || 0)), []);
    const filtered = useMemo(() => DATA.filter(r =>
      (month === 'all' || r.month === month) &&
      (store !== 'all' ? r.store === store : (area === 'all' || areaOf(r.store) === area))
    ), [month, area, store]);

    const jumlahToko = filtered.reduce((s, r) => s + r.so, 0);
    const selisihFinal = filtered.reduce((s, r) => s + r.selisihFinal, 0);
    const selisihSku = filtered.reduce((s, r) => s + r.sku, 0);

    const byMonth = useMemo(() => {
      const m = new Map();
      for (const r of filtered) {
        let o = m.get(r.month);
        if (!o) { o = { month: r.month, mo: (r.year || 0) * 100 + (MONTH_NUM[r.month] || 0), selisih: 0, selisihFinal: 0, sku: 0, hari: 0, so: 0 }; m.set(r.month, o); }
        o.selisih += r.selisih; o.selisihFinal += r.selisihFinal; o.sku += r.sku; o.hari += r.hari; o.so += r.so;
      }
      return [...m.values()].sort((a, b) => a.mo - b.mo);
    }, [filtered]);

    const detailByMonth = useMemo(() => {
      const m = new Map(); // bulan -> Map(toko -> agregat)
      for (const r of filtered) {
        if (!m.has(r.month)) m.set(r.month, new Map());
        const sm = m.get(r.month);
        let o = sm.get(r.store);
        if (!o) { o = { store: r.store, selisih: 0, selisihFinal: 0, sku: 0, hari: 0, so: 0 }; sm.set(r.store, o); }
        o.selisih += r.selisih; o.selisihFinal += r.selisihFinal; o.sku += r.sku; o.hari += r.hari; o.so += r.so;
      }
      const out = new Map();
      for (const [mo, sm] of m) out.set(mo, [...sm.values()].sort((a, b) => a.selisih - b.selisih));
      return out;
    }, [filtered]);

    const chartFinal = byMonth.map(o => ({ label: o.month, value: o.selisihFinal }));
    const chartSku = byMonth.map(o => ({ label: o.month, value: o.sku }));

    const sortedSummary = useMemo(() => {
      const key = sort.key === 'month' ? 'mo' : sort.key;
      const r = [...byMonth].sort((a, b) => typeof a[key] === 'string' ? a[key].localeCompare(b[key]) : a[key] - b[key]);
      return sort.dir === 'desc' ? r.reverse() : r;
    }, [byMonth, sort]);

    const tot = byMonth.reduce((a, o) => ({ selisih: a.selisih + o.selisih, selisihFinal: a.selisihFinal + o.selisihFinal, sku: a.sku + o.sku, hari: a.hari + o.hari, so: a.so + o.so }), { selisih: 0, selisihFinal: 0, sku: 0, hari: 0, so: 0 });

    const fieldCls = 'w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500/40';
    const SortTh = ({ label, col, align = 'left' }) => {

      return <th onClick={() => setSort(active ? { key: col, dir: sort.dir === 'asc' ? 'desc' : 'asc' } : { key: col, dir: 'asc' })}

    };

    return (
      <>
        <Card className="p-4">
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3 items-end">

  const MON_SHORT = ['', 'Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
  const gaMonthLabel = ym => { const p = (ym || '').split('-'); return p.length === 2 ? MON_SHORT[parseInt(p[1], 10)] + " '" + p[0].slice(2) : ym; };

  function GAMonthlyChart({ data }) {
    const wrapRef = useRef(null); const [w, setW] = useState(620);
    useEffect(() => { if (!wrapRef.current || typeof ResizeObserver === 'undefined') return; const ro = new ResizeObserver(e => setW(e[0].contentRect.width)); ro.observe(wrapRef.current); return () => ro.disconnect(); }, []);
    const H = 260, padL = 32, padR = 12, padT = 22, padB = 36;
    const innerW = Math.max(40, w - padL - padR), innerH = H - padT - padB;
    const n = data.length || 1;
    const max = Math.max(1, ...data.map(d => d.total));
    const slot = innerW / n, barW = Math.max(6, Math.min(42, slot * 0.6));
    const x = i => padL + slot * i + slot / 2;
    const base = padT + innerH;
    return (
      <div ref={wrapRef} style={{ width: '100%' }}>
        {data.length ? (
          <svg width={w} height={H}>
            {data.map((d, i) => {
              const totalH = (d.total / max) * innerH, doneH = (d.done / max) * innerH;
              return (
                <g key={i}>
                  <title>{`${gaMonthLabel(d.month)}\nTotal: ${d.total}\nSelesai: ${d.done} (${d.total ? Math.round(d.done / d.total * 100) : 0}%)`}</title>
                  <rect x={x(i) - barW / 2} y={base - totalH} width={barW} height={Math.max(0, totalH - doneH)} fill="#475569" rx="2" />
                  <rect x={x(i) - barW / 2} y={base - doneH} width={barW} height={Math.max(0, doneH)} fill="#22c55e" rx="2" />
                  <text x={x(i)} y={base - totalH - 5} textAnchor="middle" fontSize="10" fontWeight="600" fill="#cbd5e1">{d.total}</text>
                  <text x={x(i)} y={H - 8} textAnchor="middle" fontSize="10" fill="#94a3b8">{gaMonthLabel(d.month)}</text>
                </g>
              );
            })}
          </svg>
        ) : <div className="h-40 grid place-items-center text-sm text-slate-400">Tidak ada data.</div>}
      </div>
    );
  }

  function ApiTrendChart({ daily }) {
    const wrapRef = useRef(null);
    const [w, setW] = useState(820);
    const [gran, setGran] = useState('daily');
    useEffect(() => {
      if (!wrapRef.current || typeof ResizeObserver === 'undefined') return;
      const ro = new ResizeObserver(es => setW(es[0].contentRect.width));
      ro.observe(wrapRef.current);
      return () => ro.disconnect();
    }, []);
    const data = useMemo(() => {
      const raw = daily || [];
      if (gran === 'daily') return raw.map(d => ({ label: d.date ? d.date.slice(8) : '', value: d.sales || 0 }));
      const m = new Map();
      for (const d of raw) {
        if (!d.date) continue;
        let key, label;
        if (gran === 'weekly') { key = weekMonday(d.date); label = dayLabel(key); }
        else if (gran === 'monthly') { key = d.date.slice(0, 7); label = monthLabel(key); }
        else { key = d.date.slice(0, 4); label = key; } // tahunan
        let o = m.get(key);
        if (!o) { o = { key, label, value: 0 }; m.set(key, o); }
        o.value += d.sales || 0;
      }
      return [...m.values()].sort((a, b) => (a.key < b.key ? -1 : 1));
    }, [daily, gran]);
    const H = 300, padL = 70, padR = 14, padT = 26, padB = 26;
    const innerW = Math.max(120, w - padL - padR), innerH = H - padT - padB;
    const vals = data.map(d => d.value);
    const minV = Math.min(...(vals.length ? vals : [0]));
    const BASE = Math.min(100000000, minV); // sumbu kiri mulai 100 juta (atau lebih rendah bila ada hari di bawahnya) biar naik-turun jelas
    const maxV = Math.max(BASE + 1, ...(vals.length ? vals : [BASE + 1]));
    const ax = niceAxis(BASE, maxV, 5);
    const n = data.length || 1;
    const bw = innerW / n;
    const xb = i => padL + i * bw + bw * 0.15;
    const bwReal = bw * 0.7;
    const yb = v => padT + innerH - ((v - ax.min) / ((ax.max - ax.min) || 1)) * innerH;
    const ybc = v => Math.min(padT + innerH, Math.max(padT, yb(v)));
    const fit = polyfit(vals.length ? vals : [0], Math.min(3, Math.max(1, n - 1)));
    const linePath = data.map((_, i) => (i ? 'L' : 'M') + (xb(i) + bwReal / 2).toFixed(1) + ' ' + ybc(polyval(fit, i)).toFixed(1)).join(' ');
    return (
      <Card className="p-4 sm:p-5">
        <div className="flex items-center justify-between gap-3 mb-3">
          <h2 className="font-bold text-slate-900">Tren Penjualan {gran === 'daily' ? 'Harian' : gran === 'weekly' ? 'Mingguan' : gran === 'monthly' ? 'Bulanan' : 'Tahunan'}</h2>
          <select value={gran} onChange={e => setGran(e.target.value)} className="rounded-lg border border-slate-200 bg-white px-3 py-1.5 text-sm font-medium text-slate-600 focus:outline-none focus:ring-2 focus:ring-brand-500/40">
            <option value="daily">Penjualan Harian</option>
            <option value="weekly">Penjualan Mingguan</option>
            <option value="monthly">Penjualan Bulanan</option>
            <option value="yearly">Penjualan Tahunan</option>
          </select>
        </div>
        <div ref={wrapRef}>
          <svg width="100%" viewBox={'0 0 ' + w + ' ' + H} preserveAspectRatio="xMidYMid meet">
            {[0, 1, 2, 3, 4].map(t => { const v = ax.min + (ax.max - ax.min) * t / 4; const yy = yb(v); return (<g key={t}><line x1={padL} y1={yy} x2={w - padR} y2={yy} className="stroke-slate-200/40" /><text x={padL - 6} y={yy + 3} textAnchor="end" className="fill-slate-400" fontSize="10">{barLabel(v)}</text></g>); })}
            {data.map((d, i) => <rect key={'b' + i} x={xb(i)} y={ybc(d.value)} width={bwReal} height={Math.max(0, padT + innerH - ybc(d.value))} rx="2" className="fill-brand-500" />)}
            {n <= 40 && data.map((d, i) => d.value ? <text key={'v' + i} x={xb(i) + bwReal / 2} y={ybc(d.value) - 4} textAnchor="middle" className="fill-slate-400" fontSize="9">{barLabel(d.value)}</text> : null)}
            <path d={linePath} fill="none" stroke="#ef4444" strokeWidth="2" />
            {n <= 40 && data.map((d, i) => <text key={'x' + i} x={xb(i) + bwReal / 2} y={H - 8} textAnchor="middle" className="fill-slate-400" fontSize="9">{d.label}</text>)}
          </svg>
        </div>
      </Card>
    );
  }

  function PerfTable({ title, labelHeader, rows, total, totalOrders, hasPrev, targets }) {
    const hasTarget = !!targets;
    const [sortKey, setSortKey] = useState(hasTarget ? 'pct' : 'sales');
    const [sortDir, setSortDir] = useState('desc');
    const withT = rows.map(r => { const t = (targets && targets[r.label]) || 0; return Object.assign({}, r, { target: t, pct: t ? (r.sales / t * 100) : null }); });
    const sorted = withT.slice().sort((a, b) => {
      if (sortKey === 'label') { const av = (a.label || '').toLowerCase(), bv = (b.label || '').toLowerCase(); const c = av < bv ? -1 : av > bv ? 1 : 0; return sortDir === 'asc' ? c : -c; }
      let av, bv;
      if (sortKey === 'orders') { av = a.orders; bv = b.orders; }
      else if (sortKey === 'g') { av = a.g; bv = b.g; }
      else if (sortKey === 'target') { av = a.target; bv = b.target; }
      else if (sortKey === 'pct') { av = a.pct == null ? -1 : a.pct; bv = b.pct == null ? -1 : b.pct; }
      else { av = a.sales; bv = b.sales; }
      return sortDir === 'asc' ? av - bv : bv - av;
    });
    const setSort = k => { if (sortKey === k) setSortDir(d => d === 'asc' ? 'desc' : 'asc'); else { setSortKey(k); setSortDir('desc'); } };
    const arrow = k => sortKey === k ? <span className="text-brand-500">{sortDir === 'asc' ? ' ↑' : ' ↓'}</span> : <span className="text-slate-300"> ↕</span>;
    const pctCls = p => { if (p == null) return 'text-slate-300'; const r = Math.round(p * 10) / 10; return r >= 100 ? 'text-green-600' : r >= 80 ? 'text-amber-600' : 'text-rose-600'; };
    const totTarget = withT.reduce((a, r) => a + (r.target || 0), 0);
    const totPct = totTarget ? (total / totTarget * 100) : null;
    const thBase = 'px-3 py-2 font-semibold text-slate-500 sticky top-0 bg-white cursor-pointer select-none hover:text-slate-700 whitespace-nowrap';
    const th = (k, label, right) => <th className={thBase + (right ? ' text-right' : ' text-left')} onClick={() => setSort(k)}>{label}{arrow(k)}</th>;
    return (
      <Card className="p-4 sm:p-5">
        <h2 className="font-bold text-slate-900 mb-3">{title}</h2>

                {th('sales', 'Penjualan', true)}
                {th('orders', 'Transaksi', true)}
                {th('g', 'vs Bln Lalu', true)}
                {hasTarget && th('target', 'Target', true)}
                {hasTarget && th('pct', '% Pencapaian', true)}
              </tr>
            </thead>
            <tbody>
              {sorted.map((s, i) => (
                <tr key={i} className="border-b border-slate-50">
                  <td className="px-3 py-2 text-right text-slate-400 tabular-nums">{i + 1}</td>
                  <td className="px-3 py-2 text-slate-800 whitespace-nowrap">{s.label}</td>
                  <td className="px-3 py-2 text-right font-semibold whitespace-nowrap">{formatCurrency(s.sales)}</td>
                  <td className="px-3 py-2 text-right text-slate-500">{formatNumber(s.orders)}</td>
                  <td className="px-3 py-2 text-right">{hasPrev ? <ChangeBadge pct={s.g} /> : <span className="text-slate-300">—</span>}</td>
                  {hasTarget && <td className="px-3 py-2 text-right text-slate-500 whitespace-nowrap">{s.target ? formatCurrency(s.target) : '—'}</td>}
                  {hasTarget && <td className={'px-3 py-2 text-right font-semibold whitespace-nowrap ' + pctCls(s.pct)}>{s.pct == null ? '—' : s.pct.toFixed(1) + '%'}</td>}
                </tr>
              ))}

  function YtdPanel({ outlets, cashiers }) {
    const _pad = n => String(n).padStart(2, '0');

    const md = _pad(now.getMonth() + 1) + '-' + _pad(now.getDate());

    const [hidden, setHidden] = useState(() => { try { return localStorage.getItem('vpx_ytd_hidden') === '1'; } catch (e) { return false; } });
    const outKey = (outlets || []).join('|'); const cashKey = (cashiers || []).join('|');
    useEffect(() => {
      let alive = true; setData(d => Object.assign({}, d, { loading: true }));
      const rpc = (s, e) => fetch(SUPA_URL + '/rest/v1/rpc/iseller_summary', { method: 'POST', headers: { apikey: SUPA_KEY, Authorization: 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json' }, body: JSON.stringify({ p_start: s, p_end: e, p_outlets: outlets, p_cashiers: cashiers }) }).then(r => r.ok ? r.json() : null).catch(() => null);
      Promise.all([rpc(Y + '-01-01', Y + '-' + md), rpc((Y - 1) + '-01-01', (Y - 1) + '-' + md)]).then(([c, l]) => { if (alive) setData({ cur: c, ly: l, loading: false }); });
      return () => { alive = false; };

              <span className="inline-flex items-center gap-1.5 text-xs text-slate-500"><span className="w-2.5 h-2.5 rounded-sm bg-brand-500"></span>{Y}</span>
              <span className="ml-auto text-[11px] text-slate-400">Ikut filter Area/Toko · tanggal dikunci Jan–{dateLbl}</span>
            </div>
          </>
        )))}
      </Card>
    );
  }

  function APISellerModule({ settings }) {
    const _pad = n => String(n).padStart(2, '0');
    const _now = new Date();
    const DMAX = _now.getFullYear() + '-' + _pad(_now.getMonth() + 1) + '-' + _pad(_now.getDate());
    const DMIN = _now.getFullYear() + '-' + _pad(_now.getMonth() + 1) + '-01';
    const [startDate, setStartDate] = useState(DMIN);
    const [endDate, setEndDate] = useState(DMAX);
    const [areaId, setAreaId] = useState('all');
    const [outletSel, setOutletSel] = useState('all');
    const [salesSel, setSalesSel] = useState('all');
    const [allOutlets, setAllOutlets] = useState([]);
    const [allCashiers, setAllCashiers] = useState([]);
    const [data, setData] = useState(null);
    const [prev, setPrev] = useState(null);
    const [prevYr, setPrevYr] = useState(null);
    const [busy, setBusy] = useState(true);
    const [lastUpd, setLastUpd] = useState('');

    const RPC = SUPA_URL + '/rest/v1/rpc/iseller_summary';
    const HDR = { apikey: SUPA_KEY, Authorization: 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json' };
    const callRPC = async (s, e, outlets, cashiers) => {
      try {
        const res = await fetch(RPC, { method: 'POST', headers: HDR, body: JSON.stringify({ p_start: s, p_end: e, p_outlets: outlets, p_cashiers: cashiers }) });
        if (!res.ok) return null;
        return await res.json();
      } catch (err) { return null; }
    };
    const _norm = s => String(s || '').toUpperCase().replace(/\s+/g, ' ').trim();
    const inactiveOutlets = new Set(((settings && settings.inactiveOutlets) || []).map(x => _norm(x)));
    const inactiveSales = new Set(((settings && settings.inactiveSales) || []).map(x => _norm(x)));
    const _outOk = o => !inactiveOutlets.has(_norm(o));
    const _salOk = c => !inactiveSales.has(_norm(c));
    const inactiveOutKey = [...inactiveOutlets].sort().join('|');
    const addMonths = (ymd, delta) => {
      const p = ymd.split('-').map(Number); let y = p[0], m = p[1] - 1 + delta; const d = p[2];
      y += Math.floor(m / 12); m = ((m % 12) + 12) % 12;
      const dd = Math.min(d, new Date(y, m + 1, 0).getDate());
      return y + '-' + String(m + 1).padStart(2, '0') + '-' + String(dd).padStart(2, '0');
    };
    const addYrs = (ymd, delta) => {
      const p = ymd.split('-').map(Number); const y = p[0] + delta; const m = p[1];
      const dd = Math.min(p[2], new Date(y, m, 0).getDate());
      return y + '-' + String(m).padStart(2, '0') + '-' + String(dd).padStart(2, '0');
    };
    const scopeOutlets = () => {
      if (outletSel !== 'all') return [outletSel];
      if (areaId !== 'all') return allOutlets.filter(o => _outOk(o) && (_areaByNorm[_norm(o)] || 'Lainnya') === areaId);
      return (inactiveOutlets.size && allOutlets.length) ? allOutlets.filter(_outOk) : null;
    };

    useEffect(() => {
      const _listStart = (_now.getFullYear() - 1) + '-' + _pad(_now.getMonth() + 1) + '-01';
      callRPC(_listStart, DMAX, null, null).then(d => {
        if (!d) return;
        setAllOutlets((d.by_store || []).map(s => s.label).filter(Boolean).sort());
        setAllCashiers((d.by_cashier || []).map(c => c.label).filter(Boolean).sort());
      });
    }, []);

    useEffect(() => {
      let alive = true;
      const outlets = scopeOutlets();
      const cashiers = salesSel === 'all' ? null : [salesSel];
      const load = async () => {
        const cur = await callRPC(startDate, endDate, outlets, cashiers);
        const pv = await callRPC(addMonths(startDate, -1), addMonths(endDate, -1), outlets, cashiers);
        const pvy = await callRPC(addYrs(startDate, -1), addYrs(endDate, -1), outlets, cashiers);
        if (!alive) return;
        if (cur) { setData(cur); setPrev(pv); setPrevYr(pvy); }
        setBusy(false); setLastUpd(new Date().toLocaleTimeString('id-ID'));
      };
      load();
      const id = setInterval(load, 15000);
      return () => { alive = false; clearInterval(id); };
    }, [startDate, endDate, areaId, outletSel, salesSel, allOutlets.length, inactiveOutKey]);

    const money = v => formatCurrency(v);
    const fieldCls = 'w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500/40';
    const storeOpts = (areaId === 'all' ? allOutlets : allOutlets.filter(o => (_areaByNorm[_norm(o)] || 'Lainnya') === areaId)).filter(_outOk);

    const banner = (
      <div className="rounded-xl border-l-4 border-green-500 bg-green-500/10 p-4 text-sm text-slate-300">
        🟢 <b className="text-slate-100">Mode PRODUKSI (LIVE)</b> — data <b>ASLI</b> iSeller toko Anda · dalam Rupiah · {startDate} s/d {endDate}.
        {lastUpd ? <span> · <b className="text-green-400">🔴 LIVE</b> <span className="text-slate-400">(update {lastUpd})</span></span> : null}
      </div>
    );
    const filterBar = (
      <Card className="p-4">
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-6 gap-3 items-end">
          <Field label="Dari Tanggal"><input type="date" className={fieldCls} value={startDate} onChange={e => setStartDate(e.target.value)} /></Field>
          <Field label="Sampai Tanggal"><input type="date" className={fieldCls} value={endDate} onChange={e => setEndDate(e.target.value)} /></Field>
          <Field label="Area"><select className={fieldCls} value={areaId} onChange={e => { setAreaId(e.target.value); setOutletSel('all'); }}><option value="all">Semua Area</option>{AREA_LIST.map(a => <option key={a} value={a}>{a}</option>)}</select></Field>
          <Field label="Toko"><select className={fieldCls} value={outletSel} onChange={e => setOutletSel(e.target.value)}><option value="all">Semua Toko</option>{storeOpts.map(o => <option key={o} value={o}>{o}</option>)}</select></Field>
          <Field label="Sales"><select className={fieldCls} value={salesSel} onChange={e => setSalesSel(e.target.value)}><option value="all">Semua Sales</option>{allCashiers.filter(_salOk).map(c => <option key={c} value={c}>{c}</option>)}</select></Field>
          <button onClick={() => { setAreaId('all'); setOutletSel('all'); setSalesSel('all'); setStartDate(DMIN); setEndDate(DMAX); }} className="rounded-lg border border-slate-200 px-3 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50">Reset Filter</button>
        </div>
      </Card>
    );

    if (!data) return (<>{banner}{filterBar}<Card className="p-10 text-center text-slate-400">{busy ? 'Memuat data… (kalau lama, data produksi mungkin masih ditarik di latar belakang)' : 'Belum ada data untuk periode/filter ini.'}</Card></>);

    const cur = data, pv = prev || {};
    const avgInv = cur.paid_count ? cur.total_sales / cur.paid_count : 0;
    const avgCust = cur.customers ? cur.total_sales / cur.customers : 0;
    const pAvgInv = pv.paid_count ? pv.total_sales / pv.paid_count : 0;
    const pAvgCust = pv.customers ? pv.total_sales / pv.customers : 0;
    const hasPrev = (pv.total_sales || 0) > 0;
    const g = {
      sales: growth(cur.total_sales, pv.total_sales || 0),
      customers: growth(cur.customers, pv.customers || 0),
      invoices: growth(cur.paid_count, pv.paid_count || 0),
      avgInv: growth(avgInv, pAvgInv),
      avgCust: growth(avgCust, pAvgCust),
    };
    const pvYr = prevYr || {};
    const hasPrevYr = (pvYr.total_sales || 0) > 0;
    const gYrSales = growth(cur.total_sales, pvYr.total_sales || 0);
    const kpis = [
      { label: 'Total Penjualan', value: money(cur.total_sales), changePct: hasPrev ? g.sales : undefined, accent: 'brand', hint: 'vs bulan lalu' },
      { label: 'Total Pelanggan', value: formatNumber(cur.customers), changePct: hasPrev ? g.customers : undefined, accent: 'sky', hint: 'vs bulan lalu' },
      { label: 'Total Invoice', value: formatNumber(cur.paid_count), changePct: hasPrev ? g.invoices : undefined, accent: 'violet', hint: 'vs bulan lalu' },
      { label: 'vs Tahun Lalu', value: hasPrevYr ? formatPercent(gYrSales) : '—', changePct: hasPrevYr ? gYrSales : undefined, accent: hasPrevYr ? (gYrSales >= 0 ? 'green' : 'rose') : 'violet', hint: hasPrevYr ? ('Thn lalu: ' + money(pvYr.total_sales)) : 'Belum ada data tahun lalu' },
      { label: 'Rata-rata / Invoice', value: money(avgInv), changePct: hasPrev ? g.avgInv : undefined, accent: 'amber', hint: 'vs bulan lalu' },
      { label: 'Rata-rata / Pelanggan', value: money(avgCust), changePct: hasPrev ? g.avgCust : undefined, accent: 'green', hint: 'vs bulan lalu' },
    ];
    const pStore = {}; (pv.by_store || []).forEach(s => { pStore[s.label] = s.sales; });
    const storeRows = (cur.by_store || []).map(s => ({ label: s.label, sales: s.sales, orders: s.orders, g: growth(s.sales, pStore[s.label] || 0) }));
    const pCash = {}; (pv.by_cashier || []).forEach(c => { pCash[c.label] = c.sales; });
    const cashRows = (cur.by_cashier || []).filter(c => _salOk(c.label)).map(c => ({ label: c.label, sales: c.sales, orders: c.orders, g: growth(c.sales, pCash[c.label] || 0) }));
    const tops = cur.top_customers || [];
    const storeTot = storeRows.reduce((a, s) => a + s.sales, 0);
    const storeOrd = storeRows.reduce((a, s) => a + s.orders, 0);
    const cashTot = cashRows.reduce((a, s) => a + s.sales, 0);
    const cashOrd = cashRows.reduce((a, s) => a + s.orders, 0);
    const _tgtDim = (() => { const p = String(endDate || '').split('-'); return new Date(+p[0], +p[1], 0).getDate(); })();
    const tokoTargets = {}; Object.keys(TOKO_TARGETS).forEach(k => { tokoTargets[k] = TOKO_TARGETS[k][_tgtDim === 31 ? 1 : 0]; });
    const salesTargets = SALES_TARGETS;

    const expPeriod = startDate + ' s.d. ' + endDate;
    const _expSort = arr => arr.slice().sort((a, b) => b.sales - a.sales);
    const _expKpi = () => {
      const k = [
        ['Total Penjualan', cur.total_sales],
        ['Total Pelanggan', cur.customers],
        ['Total Transaksi', cur.paid_count],
        ['Rata-rata / Transaksi', Math.round(avgInv)],
        ['vs Bulan Lalu (%)', hasPrev ? Number(g.sales.toFixed(2)) : '-'],
      ];
      if (hasPrevYr) k.push(['vs Tahun Lalu (%)', Number(gYrSales.toFixed(2))]);
      return k;
    };
    const expHead = ['#', 'Nama', 'Penjualan', 'Transaksi', 'vs Bln Lalu (%)', 'Target', '% Pencapaian'];
    const _expRows = (rows, tmap) => _expSort(rows).map((s, i) => {
      const t = tmap[s.label] || 0; const p = t ? (s.sales / t * 100) : null;
      return [i + 1, s.label, s.sales, s.orders, hasPrev ? Number(s.g.toFixed(2)) : '-', t || '-', p == null ? '-' : Number(p.toFixed(1))];
    });
    const exportExcel = () => {
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([['Periode', expPeriod], [], ['Metrik', 'Nilai'], ..._expKpi()]), 'Ringkasan');
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([expHead, ..._expRows(storeRows, tokoTargets)]), 'Performa Toko');
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([expHead, ..._expRows(cashRows, salesTargets)]), 'Performa Tim Sales');
      XLSX.writeFile(wb, 'laporan-vapexpress-' + endDate + '.xlsx');
    };
    const exportPdf = () => {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const fmt = v => typeof v === 'number' ? formatNumber(v) : v;
      const pdfBody = (rows, tmap) => _expRows(rows, tmap).map(r => [r[0], r[1], fmt(r[2]), fmt(r[3]), r[4], fmt(r[5]), r[6] === '-' ? '-' : r[6] + '%']);
      doc.setFontSize(16); doc.text('Laporan Penjualan Vapexpress', 14, 18);
      doc.setFontSize(10); doc.setTextColor(120); doc.text('Periode: ' + expPeriod, 14, 25);
      doc.autoTable({ startY: 30, head: [['Metrik', 'Nilai']], body: _expKpi().map(r => [r[0], fmt(r[1])]), theme: 'grid', headStyles: { fillColor: [37, 99, 235] } });
      doc.setTextColor(0); doc.text('Performa Toko', 14, doc.lastAutoTable.finalY + 10);
      doc.autoTable({ startY: doc.lastAutoTable.finalY + 13, head: [expHead], body: pdfBody(storeRows, tokoTargets), theme: 'striped', headStyles: { fillColor: [37, 99, 235] }, styles: { fontSize: 8 } });
      doc.text('Performa Tim Sales', 14, doc.lastAutoTable.finalY + 10);
      doc.autoTable({ startY: doc.lastAutoTable.finalY + 13, head: [expHead], body: pdfBody(cashRows, salesTargets), theme: 'striped', headStyles: { fillColor: [37, 99, 235] }, styles: { fontSize: 8 } });
      doc.save('laporan-vapexpress-' + endDate + '.pdf');
    };

    return (
      <>
        {banner}
        {filterBar}
        <div className="flex flex-wrap items-center gap-2">
          <span className="mr-auto text-xs text-slate-400">Unduh laporan (ikut filter di atas):</span>
          <button onClick={exportExcel} className="inline-flex items-center gap-1.5 rounded-lg px-3 py-2 text-sm font-semibold shadow-sm bg-green-600 text-white hover:bg-green-700">&#11015; Excel</button>
          <button onClick={exportPdf} className="inline-flex items-center gap-1.5 rounded-lg px-3 py-2 text-sm font-semibold shadow-sm bg-brand-600 text-white hover:bg-brand-700">&#11015; PDF</button>
        </div>
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
          {kpis.map((c, i) => <KpiCard key={i} {...c} />)}
        </div>
        <YtdPanel outlets={scopeOutlets()} cashiers={salesSel === 'all' ? null : [salesSel]} />
        <ApiTrendChart daily={cur.daily || []} />
        <div className="space-y-4">
          <PerfTable title="Performa Toko" labelHeader="Toko" rows={storeRows} total={storeTot} totalOrders={storeOrd} hasPrev={hasPrev} targets={tokoTargets} />
          <PerfTable title="Performa Tim Sales" labelHeader="Sales" rows={cashRows} total={cashTot} totalOrders={cashOrd} hasPrev={hasPrev} targets={salesTargets} />
        </div>
        <Card className="p-4 sm:p-5">
          <h2 className="font-bold text-slate-900 mb-1">Pelanggan Top Spender</h2>
          <p className="text-xs text-slate-400 mb-3">Top 50 berdasarkan total belanja · mengikuti filter</p>
          <div className="overflow-auto nice-scroll max-h-[420px]">
            <table className="min-w-full text-sm">
              <thead><tr className="text-left border-b border-slate-100 bg-slate-50/60">{['#', 'Nama Pelanggan', 'Cabang Terbanyak', 'Sales Terakhir', 'Transaksi', 'Total Belanja'].map((h, i) => <th key={i} className={'px-3 py-2 font-semibold text-slate-500 sticky top-0 bg-slate-50 ' + (i >= 4 ? 'text-right' : '')}>{h}</th>)}</tr></thead>
              <tbody>
                {tops.map((c, i) => <tr key={i} className="border-b border-slate-50"><td className="px-3 py-2 text-slate-400">{i + 1}</td><td className="px-3 py-2 text-slate-800 font-medium whitespace-nowrap">{(c.customer && c.customer.trim() ? c.customer : '(tanpa nama)') + ' - ' + (c.phone || '')}</td><td className="px-3 py-2 text-slate-500 whitespace-nowrap">{c.top_store}</td><td className="px-3 py-2 text-slate-500 whitespace-nowrap">{c.last_cashier}</td><td className="px-3 py-2 text-right text-slate-500">{formatNumber(c.txns)}</td><td className="px-3 py-2 text-right font-semibold whitespace-nowrap">{money(c.spend)}</td></tr>)}
                {!tops.length && <tr><td colSpan="6" className="px-3 py-8 text-center text-slate-400">Belum ada data.</td></tr>}
              </tbody>
            </table>
          </div>
        </Card>
      </>
    );
  }

  function MenuSettingsEditor({ settings, onSave, canEdit = true }) {
    const byLabel = {}; MENUS.forEach(m => { byLabel[m.label] = m; });
    const [order, setOrder] = useState(applyMenuSettings(settings, true).map(m => m.label).filter(l => l !== 'Pengaturan'));
    const [hidden, setHidden] = useState((settings && settings.hidden) || []);
    const [names, setNames] = useState(Object.assign({}, (settings && settings.names) || {}));
    const [saved, setSaved] = useState(false);
    const isHidden = l => hidden.indexOf(l) !== -1;
    const toggle = l => { setSaved(false); setHidden(isHidden(l) ? hidden.filter(x => x !== l) : [...hidden, l]); };
    const move = (i, d) => { const j = i + d; if (j < 0 || j >= order.length) return; const a = [...order]; const t = a[i]; a[i] = a[j]; a[j] = t; setSaved(false); setOrder(a); };
    const rename = (l, v) => { setSaved(false); setNames(Object.assign({}, names, { [l]: v })); };
    const save = () => {
      const clean = {};
      Object.keys(names).forEach(l => { const v = (names[l] || '').trim(); if (v && byLabel[l] && v !== byLabel[l].label) clean[l] = v; });
      onSave({ order: [...order, 'Pengaturan'], hidden: hidden.filter(l => l !== 'Pengaturan'), names: clean }); setSaved(true);
    };
    const ab = 'rounded border border-slate-200 px-2 py-1 text-xs text-slate-600 hover:bg-slate-50 disabled:opacity-30';
    return (
      <div className="space-y-2">
        <p className="text-[11px] text-slate-400">Ketik di kolom nama buat ganti nama menu · panah ↑↓ buat urutkan · Sembunyikan buat hold. Menu <b>Pengaturan</b> selalu di paling bawah (di atas Logout).</p>
        {order.map((label, i) => { const m = byLabel[label]; if (!m) return null; const hid = isHidden(label);
          return (
            <div key={label} className="flex items-center gap-2 rounded-lg border border-slate-100 px-2 py-2">
              <span className="shrink-0">{m.icon}</span>
              <input value={names[label] !== undefined ? names[label] : m.label} onChange={e => rename(label, e.target.value)} title={'Nama asli: ' + m.label} readOnly={!canEdit}
                className={'flex-1 min-w-0 rounded border border-transparent hover:border-slate-200 focus:border-brand-500 focus:bg-white px-2 py-1 text-sm outline-none ' + (hid ? 'text-slate-300 line-through' : 'text-slate-700')} />
              <button className={ab} onClick={() => move(i, -1)} disabled={!canEdit || i === 0}>↑</button>
              <button className={ab} onClick={() => move(i, 1)} disabled={!canEdit || i === order.length - 1}>↓</button>
              <button className={'shrink-0 rounded px-2.5 py-1 text-xs font-medium disabled:opacity-40 ' + (hid ? 'bg-brand-50 text-brand-700' : 'bg-slate-100 text-slate-500')} onClick={() => toggle(label)} disabled={!canEdit}>{hid ? 'Tampilkan' : 'Sembunyikan'}</button>
            </div>
          );
        })}
        {canEdit && <div className="flex items-center gap-3 pt-1">
          <button onClick={save} className="rounded-lg bg-brand-600 px-4 py-2 text-sm font-semibold text-white hover:bg-brand-700">Simpan</button>
          {saved && <span className="text-sm text-green-600">✓ Tersimpan</span>}
        </div>}
      </div>
    );
  }

  function IsellerStatus() {
    const [st, setSt] = useState({ loading: true, ok: false, latest: null, mSales: 0, mOrders: 0, at: '' });
    const pad = n => String(n).padStart(2, '0');
    const fmtDate = ymd => { if (!ymd) return '-'; const p = ymd.split('-'); return Number(p[2]) + ' ' + MONTHS[Number(p[1]) - 1] + ' ' + p[0]; };
    const load = async () => {
      setSt(s => Object.assign({}, s, { loading: true }));
      const now = new Date();
      const end = now.getFullYear() + '-' + pad(now.getMonth() + 1) + '-' + pad(now.getDate());
      const s0 = new Date(now.getTime() - 75 * 86400000);
      const start = s0.getFullYear() + '-' + pad(s0.getMonth() + 1) + '-' + pad(s0.getDate());
      const ym = now.getFullYear() + '-' + pad(now.getMonth() + 1);
      try {
        const res = await fetch(SUPA_URL + '/rest/v1/rpc/iseller_summary', {
          method: 'POST',
          headers: { apikey: SUPA_KEY, Authorization: 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json' },
          body: JSON.stringify({ p_start: start, p_end: end, p_outlets: null, p_cashiers: null })
        });
        if (!res.ok) throw new Error('http ' + res.status);
        const d = await res.json();
        const daily = (d.daily || []).slice().sort((a, b) => a.date < b.date ? -1 : 1);
        const latest = daily.length ? daily[daily.length - 1] : null;
        let mS = 0, mO = 0;
        daily.forEach(x => { if (x.date && x.date.indexOf(ym) === 0) { mS += x.sales || 0; mO += x.orders || 0; } });
        setSt({ loading: false, ok: true, latest: latest, mSales: mS, mOrders: mO, at: pad(now.getHours()) + ':' + pad(now.getMinutes()) });
      } catch (e) {
        const t = new Date();
        setSt({ loading: false, ok: false, latest: null, mSales: 0, mOrders: 0, at: pad(t.getHours()) + ':' + pad(t.getMinutes()) });
      }
    };
    useEffect(() => { load(); }, []);

    const now = new Date();
    const todayY = now.getFullYear() + '-' + pad(now.getMonth() + 1) + '-' + pad(now.getDate());
    const daysBehind = st.latest ? Math.round((Date.parse(todayY) - Date.parse(st.latest.date)) / 86400000) : null;
    const fresh = daysBehind != null && daysBehind <= 1;
    const stat = (label, value, sub, accent) => (
      <div className="rounded-lg border border-slate-100 px-3 py-3">
        <div className="text-[11px] font-medium text-slate-400">{label}</div>
        <div className={'mt-0.5 text-lg font-bold ' + (accent || 'text-slate-900')}>{value}</div>
        {sub && <div className="text-[11px] text-slate-400 mt-0.5">{sub}</div>}
      </div>
    );

    if (st.loading) return <p className="text-sm text-slate-400 py-4">Memuat status…</p>;

    return (
      <div className="space-y-4">

  const SHEET_ID = '1latFyfiQ81fVFFG21Eijl5UtYe3pJimDpTvg_f0LKIg';
  function parseCSV(text) {
    const rows = []; let row = [], field = '', inQ = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      if (inQ) { if (c === '"') { if (text[i + 1] === '"') { field += '"'; i++; } else inQ = false; } else field += c; }
      else if (c === '"') inQ = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n' || c === '\r') { if (c === '\r' && text[i + 1] === '\n') i++; row.push(field); rows.push(row); row = []; field = ''; }
      else field += c;
    }
    if (field.length || row.length) { row.push(field); rows.push(row); }
    return rows;
  }
  const parseRp = s => { const n = String(s == null ? '' : s).replace(/[^0-9]/g, ''); return n ? Number(n) : 0; };
  async function fetchSheetTab(sheetName) {
    const url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:csv&sheet=' + encodeURIComponent(sheetName) + '&_=' + Date.now();
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return parseCSV(await res.text());
  }
  function parseSheetTable(rows, cfg) {
    if (!rows || !rows.length) return { months: cfg.months, rows: [] };
    const header = rows[0].map(h => (h || '').trim());
    const idx = name => header.indexOf(name);
    const monthI = cfg.months.map(m => idx(m));
    const statusI = cfg.statusHeader ? idx(cfg.statusHeader) : -1;
    const out = [];
    for (let r = 1; r < rows.length; r++) {
      const row = rows[r]; if (!row) continue;
      const obj = { values: {} };
      cfg.labelCols.forEach(c => { const i = idx(c.header); obj[c.key] = i >= 0 ? (row[i] || '').trim() : ''; });
      const primary = (obj[cfg.primaryKey] || '').toLowerCase();
      if (!primary || primary.indexOf('grand total') !== -1 || primary === 'total') continue;
      cfg.months.forEach((m, k) => { const v = parseRp(row[monthI[k]]); if (v) obj.values[m] = v; });
      if (statusI >= 0) obj.status = (row[statusI] || '').trim() || 'Waiting';
      out.push(obj);
    }
    return { months: cfg.months, rows: out };
  }

    const grand = rows.reduce((s, r) => s + rowTotal(r), 0);
    const kpis = kpiFn ? kpiFn({ rows, months, grand }) : [];
    const th = 'px-3 py-2 text-left font-semibold text-slate-500 whitespace-nowrap';

            <p className="text-sm text-rose-600 font-medium">Gagal baca Google Sheet: {err}</p>
            <p className="text-xs text-slate-400 mt-1">Pastikan sheet di-share "Siapa saja yang punya link bisa melihat".</p>
            <button onClick={load} className="mt-3 rounded-lg bg-brand-600 px-4 py-2 text-sm font-semibold text-white">Coba lagi</button>
          </Card>

          <Card className="p-8 text-center text-slate-400 text-sm">Memuat data dari Google Sheet…</Card>

          <>
            {kpis.length > 0 && <div className={'grid grid-cols-2 gap-3 ' + (kpis.length >= 4 ? 'sm:grid-cols-4' : 'sm:grid-cols-3')}>{kpis.map((k, i) => <KpiCard key={i} {...k} />)}</div>}
            <Card className="p-0 overflow-x-auto">
              <table className="w-full text-sm border-collapse">
                <thead className="bg-slate-50 border-b border-slate-200">
                  <tr>
                    <th className={th}>#</th>
                    {labelCols.map(c => <th key={c.key} className={th}>{c.label}</th>)}
                    {months.map(m => <th key={m} className={th + ' text-right'}>{m}</th>)}
                    <th className={th + ' text-right'}>Total</th>
                    {showStatus && <th className={th}>Status</th>}
                  </tr>
                </thead>
                <tbody>
                  {rows.map((r, i) => (
                    <tr key={i} className="border-b border-slate-100">
                      <td className={td + ' text-slate-400'}>{i + 1}</td>
                      {labelCols.map(c => <td key={c.key} className={td + ' ' + (c.className || '')}>{r[c.key]}</td>)}
                      {months.map(m => <td key={m} className={td + ' text-right'}>{(r.values || {})[m] ? formatCurrency((r.values || {})[m]) : <span className="text-slate-300">-</span>}</td>)}
                      <td className={td + ' text-right font-semibold text-slate-900'}>{formatCurrency(rowTotal(r))}</td>
                      {showStatus && <td className={td}><span className={'text-[11px] px-2 py-0.5 rounded-full font-medium ' + (r.status === 'Active' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700')}>{r.status}</span></td>}
                    </tr>
                  ))}
                  <tr className="bg-slate-50 font-bold text-slate-900 border-t-2 border-slate-200">
                    <td className={td}></td>
                    {labelCols.map((c, j) => <td key={c.key} className={td}>{j === 0 ? 'Grand Total' : ''}</td>)}
                    {months.map(m => <td key={m} className={td + ' text-right'}>{formatCurrency(colTotal(m))}</td>)}
                    <td className={td + ' text-right'}>{formatCurrency(grand)}</td>
                    {showStatus && <td className={td}></td>}
                  </tr>
                </tbody>
              </table>
            </Card>
          </>
        )}
      </>
    );
  }
