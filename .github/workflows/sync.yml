name: Sync iSeller ke Supabase
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}
concurrency:
  group: sync-iseller
  cancel-in-progress: false
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Tarik order + refund terbaru iSeller -> Supabase
        env:
          ISELLER_CLIENT_ID: ${{ secrets.ISELLER_CLIENT_ID }}
          ISELLER_CLIENT_SECRET: ${{ secrets.ISELLER_CLIENT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cat > sync.mjs <<'EOF'
          const CID=process.env.ISELLER_CLIENT_ID, CSEC=process.env.ISELLER_CLIENT_SECRET;
          const SUPA=process.env.SUPABASE_URL.replace(/\/$/,''), SR=process.env.SUPABASE_SERVICE_KEY;
          const sleep=ms=>new Promise(s=>setTimeout(s,ms));
          const SH={apikey:SR,Authorization:'Bearer '+SR};
          const tr=await fetch('https://isellershop.com/oauth/token',{method:'POST',headers:{Authorization:'Basic '+Buffer.from(CID+':'+CSEC).toString('base64'),'Content-Type':'application/x-www-form-urlencoded'},body:'grant_type=client_credentials'});
          if(!tr.ok){ console.error('Token gagal', tr.status, await tr.text()); process.exit(1); }
          const tj=await tr.json();
          const base=tj.resource_url.replace(/\/$/,'')+'/api/v2';
          const H={Authorization:'Bearer '+tj.access_token,'Content-Type':'application/json'};
          async function getPage(p){ for(let i=0;i<3;i++){ try{ const r=await fetch(base+'/GetOrders',{method:'POST',headers:H,body:JSON.stringify({time_zone:7,page:p})}); if(r.ok) return await r.json(); }catch(e){} await sleep(3000);} return null; }
          async function getTx(p){ for(let i=0;i<3;i++){ try{ const r=await fetch(base+'/GetTransactions',{method:'POST',headers:H,body:JSON.stringify({time_zone:7,page:p,page_size:5000})}); if(r.ok) return await r.json(); }catch(e){} await sleep(3000);} return null; }
          const now=new Date(Date.now()+7*3600*1000); now.setDate(now.getDate()-1);
          const cut=now.toISOString().slice(0,10);

          // ===== 1) ORDERS =====
          let lo=3700, hi=8000;
          if(((((await getPage(lo))||{}).orders)||[]).length===0) lo=2000;
          while(hi-lo>1){ const mid=Math.floor((lo+hi)/2); const c=((((await getPage(mid))||{}).orders)||[]).length; if(c>0) lo=mid; else hi=mid; }
          const last=lo;
          const rows=[];
          for(let p=last;p>=1;p--){ const r=await getPage(p); if(!r) continue; const o=r.orders||[]; if(!o.length) continue; const newest=(o[o.length-1].order_date||'').slice(0,10);
            for(const x of o){ const d=(x.order_date||'').slice(0,10); if(d<cut) continue;
              rows.push({date:d, outlet:x.outlet_name||'', cashier:((x.cashier_first_name||'')+' '+(x.cashier_last_name||'')).trim(), customer:((x.customer_first_name||'')+' '+(x.customer_last_name||'')).trim(), phone:x.customer_phone_number||'', total:Number(x.total_amount)||0, status:x.status||'', paid:x.payment_status==='paid', ref:x.order_reference||'', channel:x.channel||''}); }
            if(newest<cut) break; }
          // hapus order (BUKAN refund) di jendela, lalu insert order
          await fetch(SUPA+'/rest/v1/iseller_orders?date=gte.'+cut+'&channel=neq.refund',{method:'DELETE',headers:SH});
          for(let i=0;i<rows.length;i+=500){ const ch=rows.slice(i,i+500); await fetch(SUPA+'/rest/v1/iseller_orders',{method:'POST',headers:{...SH,'Content-Type':'application/json',Prefer:'return=minimal'},body:JSON.stringify(ch)}); }
          console.log('OK order: '+rows.length+' sejak '+cut+' (halaman terakhir '+last+')');

          // ===== 2) REFUNDS (dari GetTransactions, type=refund) =====
          let tlo=100, thi=400;
          if(((((await getTx(tlo))||{}).transactions)||[]).length===0) tlo=1;
          while(thi-tlo>1){ const mid=Math.floor((tlo+thi)/2); const c=((((await getTx(mid))||{}).transactions)||[]).length; if(c>0) tlo=mid; else thi=mid; }
          const tlast=tlo;
          const refs=[], seen={};
          for(let p=tlast;p>=Math.max(1,tlast-4);p--){ const r=await getTx(p); if(!r) continue; const tt=r.transactions||[]; if(!tt.length) continue; const oldest=(tt[0].transaction_date||'').slice(0,10);
            for(const t of tt){ if(t.type!=='refund') continue; const d=(t.transaction_date||'').slice(0,10); if(d<cut) continue; const id=String(t.transaction_id||''); if(seen[id]) continue; seen[id]=1; refs.push({date:d, ref:t.order_reference||'', amount:Number(t.amount)||0}); }
            if(oldest<cut) break; }
          // lookup outlet/cashier tiap refund dari order-nya
          const uref=[...new Set(refs.map(r=>r.ref))]; const omap={};
          for(let i=0;i<uref.length;i+=80){ const b=uref.slice(i,i+80); const il=b.map(x=>'"'+x.replace(/#/g,'%23')+'"').join(','); try{ const rr=await fetch(SUPA+'/rest/v1/iseller_orders?ref=in.('+il+')&select=ref,outlet,cashier&limit=5000',{headers:SH}); const jj=await rr.json(); for(const row of jj){ if(!omap[row.ref]) omap[row.ref]={outlet:row.outlet,cashier:row.cashier}; } }catch(e){} }
          const rrows=refs.map(r=>({date:r.date, outlet:(omap[r.ref]||{}).outlet||'', cashier:(omap[r.ref]||{}).cashier||'', customer:'', phone:'', total:-Math.abs(r.amount), status:'refund', paid:true, ref:r.ref, channel:'refund'}));
          await fetch(SUPA+'/rest/v1/iseller_orders?date=gte.'+cut+'&channel=eq.refund',{method:'DELETE',headers:SH});
          for(let i=0;i<rrows.length;i+=500){ const ch=rrows.slice(i,i+500); await fetch(SUPA+'/rest/v1/iseller_orders',{method:'POST',headers:{...SH,'Content-Type':'application/json',Prefer:'return=minimal'},body:JSON.stringify(ch)}); }
          console.log('OK refund: '+rrows.length+' sejak '+cut+' (tx halaman terakhir '+tlast+')');
          EOF
          node sync.mjs
