name: Sync iSeller ke Supabase
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'auto = normal (2 hari) · full = rekonsiliasi sebulan penuh (tarik ulang untuk nyocokin ke iSeller)'
        default: 'auto'
        required: false
concurrency:
  group: sync-iseller
  cancel-in-progress: false
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Tarik order + refund terbaru iSeller -> Supabase
        env:
          ISELLER_CLIENT_ID: ${{ secrets.ISELLER_CLIENT_ID }}
          ISELLER_CLIENT_SECRET: ${{ secrets.ISELLER_CLIENT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          MODE: ${{ github.event.inputs.mode }}
        run: |
          cat > sync.mjs <<'EOF'
          const CID=process.env.ISELLER_CLIENT_ID, CSEC=process.env.ISELLER_CLIENT_SECRET;
          const SUPA=process.env.SUPABASE_URL.replace(/\/$/,''), SR=process.env.SUPABASE_SERVICE_KEY;
          const sleep=ms=>new Promise(s=>setTimeout(s,ms));
          const SH={apikey:SR,Authorization:'Bearer '+SR};
          const tr=await fetch('https://isellershop.com/oauth/token',{method:'POST',headers:{Authorization:'Basic '+Buffer.from(CID+':'+CSEC).toString('base64'),'Content-Type':'application/x-www-form-urlencoded'},body:'grant_type=client_credentials'});
          if(!tr.ok){ console.error('Token gagal', tr.status, await tr.text()); process.exit(1); }
          const tj=await tr.json();
          const base=tj.resource_url.replace(/\/$/,'')+'/api/v2';
          const H={Authorization:'Bearer '+tj.access_token,'Content-Type':'application/json'};
          async function getPage(p){ for(let i=0;i<3;i++){ try{ const r=await fetch(base+'/GetOrders',{method:'POST',headers:H,body:JSON.stringify({time_zone:7,page:p})}); if(r.ok) return await r.json(); }catch(e){} await sleep(3000);} return null; }
          async function getPageD(p){ for(let i=0;i<3;i++){ try{ const r=await fetch(base+'/GetOrders',{method:'POST',headers:H,body:JSON.stringify({time_zone:7,page:p,includes:'OrderDetails'})}); if(r.ok) return await r.json(); }catch(e){} await sleep(3000);} return null; }
          async function getTx(p){ for(let i=0;i<3;i++){ try{ const r=await fetch(base+'/GetTransactions',{method:'POST',headers:H,body:JSON.stringify({time_zone:7,page:p,page_size:5000})}); if(r.ok) return await r.json(); }catch(e){} await sleep(3000);} return null; }
          // ingat "halaman terakhir" run sebelumnya biar ga binary-search dari nol (hemat ~1-2 menit/run)
          async function stGet(k){ try{ const r=await fetch(SUPA+'/rest/v1/sync_state?key=eq.'+k+'&select=value',{headers:SH}); const j=await r.json(); return (j&&j[0])?Number(j[0].value)||0:0; }catch(e){ return 0; } }
          async function stSet(k,v){ try{ await fetch(SUPA+'/rest/v1/sync_state',{method:'POST',headers:{...SH,'Content-Type':'application/json',Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({key:k,value:v,updated_at:new Date().toISOString()})}); }catch(e){} }
          // cari halaman terakhir CEPAT: mulai dari (tersimpan - 3), naik sampai kosong. Fallback binary-search kalau state kosong.
          // cnt = fungsi yang ngembaliin jumlah item di 1 halaman (1 panggilan API per halaman).
          async function findLast(cnt, saved, floorLo, floorHi){
            if(saved>0){ let base0=Math.max(1,saved-3); let anchor=0;
              // mundur cari halaman yang masih ada isinya (kalau saved kejauhan)
              for(let p=base0; p>=1; p-=5){ if(await cnt(p)>0){ anchor=p; break; } }
              if(anchor===0) anchor=1;
              // naik sampai halaman kosong
              let last=anchor, q=anchor+1, guard=0;
              while(guard++<80){ if(await cnt(q)>0){ last=q; q++; } else break; }
              return last;
            }
            // fallback: binary-search (run pertama, state belum ada)
            let lo=floorLo, hi=floorHi;
            if(await cnt(lo)===0) lo=Math.floor(floorLo/2);
            while(hi-lo>1){ const mid=Math.floor((lo+hi)/2); if(await cnt(mid)>0) lo=mid; else hi=mid; }
            return lo;
          }

          // ===== JENDELA SYNC =====
          // Normal: 2 hari (kemarin+hari ini) tiap 15 menit -> cepat & segar.
          // FULL (2x sehari ~02:xx & ~14:xx WIB, atau dipicu manual mode=full): tarik ulang
          //   sebulan penuh (dari 4 hari sebelum awal bulan) supaya order yang telat masuk
          //   / pembayaran yang baru dikonfirmasi di iSeller ikut ke-sync -> angka nyocok.
          //   (Order ditarik dulu semua, baru DELETE+INSERT di akhir ~1-2 menit -> blip minim.)
          const nowWIB=new Date(Date.now()+7*3600*1000);
          const _h=nowWIB.getUTCHours();
          const WIDE=(process.env.MODE==='full')||((_h===2 || _h===14) && nowWIB.getUTCMinutes()<15);
          const cd=new Date(nowWIB.getTime());
          if(WIDE){ cd.setUTCDate(1); cd.setUTCDate(cd.getUTCDate()-4); }
          else { cd.setUTCDate(cd.getUTCDate()-1); }
          const cut=cd.toISOString().slice(0,10);
          console.log('MODE '+(WIDE?'FULL (rekonsiliasi sebulan)':'cepat (2 hari)')+' · cut='+cut);

          // ===== 1) ORDERS =====
          const savedOrd=await stGet('orders_last_page');
          const last=await findLast(async p=>(((await getPage(p))||{}).orders||[]).length, savedOrd, 3700, 8000);
          await stSet('orders_last_page', last);
          console.log('halaman order terakhir: '+last+(savedOrd?' (dari state '+savedOrd+')':' (binary-search)'));
          const rows=[];
          for(let p=last;p>=1;p--){ const r=await getPage(p); if(!r) continue; const o=r.orders||[]; if(!o.length) continue; const newest=(o[o.length-1].order_date||'').slice(0,10);
            for(const x of o){ const d=(x.order_date||'').slice(0,10); if(d<cut) continue;
              rows.push({date:d, outlet:x.outlet_name||'', cashier:((x.cashier_first_name||'')+' '+(x.cashier_last_name||'')).trim(), customer:((x.customer_first_name||'')+' '+(x.customer_last_name||'')).trim(), phone:x.customer_phone_number||'', total:Number(x.total_amount)||0, status:x.status||'', paid:x.payment_status==='paid', ref:x.order_reference||'', channel:x.channel||''}); }
            if(newest<cut) break; }
          // hapus order (BUKAN refund) di jendela, lalu insert order
          await fetch(SUPA+'/rest/v1/iseller_orders?date=gte.'+cut+'&channel=neq.refund',{method:'DELETE',headers:SH});
          for(let i=0;i<rows.length;i+=500){ const ch=rows.slice(i,i+500); await fetch(SUPA+'/rest/v1/iseller_orders',{method:'POST',headers:{...SH,'Content-Type':'application/json',Prefer:'return=minimal'},body:JSON.stringify(ch)}); }
          console.log('OK order: '+rows.length+' sejak '+cut+' (halaman terakhir '+last+')');

          // ===== 2) REFUNDS + GRAB/TOKO (dari GetTransactions) =====
          const GT_CUT='2026-01-01';                    // histori grab/toko ditarik sejak Januari
          const scanCut = WIDE ? GT_CUT : cut;          // di WIDE scan mundur sampai Jan (buat grab/toko); fast cukup 2 hari
          const PT={ 'GRAB MART':'grabmart', 'TOKOPEDIA':'tokopedia' };
          const savedTx=await stGet('tx_last_page');
          const tlast=await findLast(async p=>(((await getTx(p))||{}).transactions||[]).length, savedTx, 100, 400);
          await stSet('tx_last_page', tlast);
          const tfloor = WIDE ? 1 : Math.max(1,tlast-4);
          const refs=[], seen={}, gtx=[];
          for(let p=tlast;p>=tfloor;p--){ const r=await getTx(p); if(!r) continue; const tt=r.transactions||[]; if(!tt.length) continue; const oldest=(tt[0].transaction_date||'').slice(0,10);
            for(const t of tt){ const d=(t.transaction_date||'').slice(0,10);
              if(t.type==='refund' && d>=cut){ const id=String(t.transaction_id||''); if(!seen[id]){ seen[id]=1; refs.push({date:d, ref:t.order_reference||'', amount:Number(t.amount)||0}); } }
              else if(WIDE && t.type==='sale' && PT[t.payment_type_name] && d>=GT_CUT){ gtx.push({ref:t.order_reference||'', date:d, amt:Number(t.amount)||0, ch:PT[t.payment_type_name]}); }
            }
            if(oldest<scanCut) break; }
          // lookup outlet tiap ref (refund + grab/toko) dari order-nya
          const uref=[...new Set(refs.map(r=>r.ref).concat(gtx.map(g=>g.ref)))]; const omap={};
          for(let i=0;i<uref.length;i+=80){ const b=uref.slice(i,i+80); const il=b.map(x=>'"'+x.replace(/#/g,'%23')+'"').join(','); try{ const rr=await fetch(SUPA+'/rest/v1/iseller_orders?ref=in.('+il+')&select=ref,outlet,cashier&limit=5000',{headers:SH}); const jj=await rr.json(); for(const row of jj){ if(!omap[row.ref]) omap[row.ref]={outlet:row.outlet,cashier:row.cashier}; } }catch(e){} }
          const rrows=refs.map(r=>({date:r.date, outlet:(omap[r.ref]||{}).outlet||'', cashier:(omap[r.ref]||{}).cashier||'', customer:'', phone:'', total:-Math.abs(r.amount), status:'refund', paid:true, ref:r.ref, channel:'refund'}));
          await fetch(SUPA+'/rest/v1/iseller_orders?date=gte.'+cut+'&channel=eq.refund',{method:'DELETE',headers:SH});
          for(let i=0;i<rrows.length;i+=500){ const ch=rrows.slice(i,i+500); await fetch(SUPA+'/rest/v1/iseller_orders',{method:'POST',headers:{...SH,'Content-Type':'application/json',Prefer:'return=minimal'},body:JSON.stringify(ch)}); }
          console.log('OK refund: '+rrows.length+' sejak '+cut+' (tx halaman terakhir '+tlast+')');

          // ===== 3) GRAB/TOKO -> tabel report_data (dibaca dashboard menu Report) — hanya WIDE =====
          if(WIDE){
            const gt={ grabmart:{}, tokopedia:{} };
            for(const g of gtx){ const out=(omap[g.ref]||{}).outlet||'(Lainnya)'; const bo=gt[g.ch]; if(!bo[out]) bo[out]={}; if(!bo[out][g.date]) bo[out][g.date]=[0,0]; bo[out][g.date][0]+=g.amt; bo[out][g.date][1]+=1; }
            const stamp=new Date(Date.now()+7*3600*1000).toISOString().slice(0,16).replace('T',' ')+' WIB';
            for(const key of ['grabmart','tokopedia']){ const bo=gt[key]; if(!Object.keys(bo).length) continue;
              await fetch(SUPA+'/rest/v1/report_data',{method:'POST',headers:{...SH,'Content-Type':'application/json',Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({key:key, data:{updated:stamp, byOutlet:bo}})});
            }
            console.log('OK grab/toko: grabmart '+Object.keys(gt.grabmart).length+' outlet · tokopedia '+Object.keys(gt.tokopedia).length+' outlet');
          }

          // ===== 4) ORDER ITEMS (produk per struk) — INCREMENTAL (nyicil per hari), buat Follow Up HOT =====
          // GetOrders + includes:"OrderDetails" -> order_details[] keisi. Tulis ke iseller_order_items (tabel terpisah).
          // Cuma refresh 3 HARI terakhir (nangkep order telat sync), TIDAK hapus histori lama -> data numpuk & ringan.
          // Histori awal ditarik sekali (script pull-items-now.ps1). HOT (belanja 13-14 hari lalu) sudah pasti ada dari cicilan hari2 sebelumnya.
          try{
            // WIDE/full = tarik dari AWAL BULAN (isi histori pertama kali / rekonsiliasi). Run biasa = cukup 3 hari.
            const idCut=new Date(nowWIB.getTime());
            if(WIDE){ idCut.setUTCDate(1); } else { idCut.setUTCDate(idCut.getUTCDate()-3); }
            const iCut=idCut.toISOString().slice(0,10);
            const items=[]; const seenRef={};
            for(let p=last;p>=1;p--){ const r=await getPageD(p); if(!r) continue; const o=r.orders||[]; if(!o.length) continue; const newest=(o[o.length-1].order_date||'').slice(0,10);
              for(const x of o){ const d=(x.order_date||'').slice(0,10); if(d<iCut) continue; if(x.payment_status!=='paid') continue;
                const ref=x.order_reference||''; if(!ref||seenRef[ref]) continue; seenRef[ref]=1;
                const dets=x.order_details||[]; let sq=0;
                for(const it of dets){ items.push({ref:ref, seq:sq++, product_name:(it.product_name||'').slice(0,200), sku:it.sku||'', qty:Number(it.quantity)||0, price:Number(it.base_price)||0, order_date:d}); }
              }
              if(newest<iCut) break; }
            // self-heal 3 hari terakhir aja: hapus 3 hari lalu insert (histori >3 hari TIDAK disentuh)
            await fetch(SUPA+'/rest/v1/iseller_order_items?order_date=gte.'+iCut,{method:'DELETE',headers:SH});
            for(let i=0;i<items.length;i+=500){ const ch=items.slice(i,i+500); await fetch(SUPA+'/rest/v1/iseller_order_items',{method:'POST',headers:{...SH,'Content-Type':'application/json',Prefer:'return=minimal'},body:JSON.stringify(ch)}); }
            console.log('OK items: '+items.length+' produk (refresh 3 hari sejak '+iCut+', '+Object.keys(seenRef).length+' struk)');
          }catch(e){ console.error('items pass gagal (dilewati):', e.message); }
          EOF
          node sync.mjs
